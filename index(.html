<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sanctuary" />
  <meta name="theme-color" content="#1a1014" />
  <title>Sanctuary — I am rich. I am healthy.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    if (window.console && console.warn) {
      const origWarn = console.warn;
      console.warn = function(msg, ...args) {
        if (typeof msg === "string" && msg.includes("cdn.tailwindcss.com")) return;
        origWarn.call(this, msg, ...args);
      };
    }
  </script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);

      /* PROFESSIONAL PALETTE: Aubergine + cream + gold */
      --bg-base: #f5efe6;
      --bg-elevated: #faf6ef;
      --ink-primary: #1a1014;
      --ink-secondary: #3d2934;
      --ink-tertiary: #6b5560;
      --ink-muted: #9a8590;
      --accent-gold: #b8893a;
      --accent-gold-bright: #d4a155;
      --accent-plum: #5d2e3f;
      --accent-rose: #a04060;
      --line-soft: #e6d9c8;
      --line-medium: #c9b8a3;
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-base);
      color: var(--ink-primary);
      font-family: 'Inter Tight', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
    }

    .display-font { font-family: 'Fraunces', Georgia, serif; }

    /* Subtle grain texture for warmth */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.92); }
      50% { transform: scale(1.08); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
    .breath-circle { animation: breathe 9s ease-in-out infinite; }

    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.15s; }
    .stagger-3 { animation-delay: 0.25s; }
    .stagger-4 { animation-delay: 0.35s; }
    .stagger-5 { animation-delay: 0.45s; }
    .stagger-6 { animation-delay: 0.55s; }
    .stagger-7 { animation-delay: 0.65s; }

    /* APP CONTAINER */
    .app-shell {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom));
    }

    /* HEADER with serif eyebrow */
    .eyebrow {
      font-family: 'Inter Tight', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent-gold);
    }

    .display-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--ink-primary);
    }

    .display-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent-rose);
    }

    /* DECORATIVE ORNAMENT */
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-medium), transparent);
    }
    .ornament-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-gold);
    }

    /* SESSION CARD */
    .session-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--line-soft);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .session-card:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -12px rgba(26, 16, 20, 0.18);
    }
    .session-card:active {
      transform: translateY(0);
    }
    .session-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }
    .session-card:hover::after {
      transform: scaleX(1);
    }

    .session-numeral {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.625rem;
      font-weight: 400;
      font-style: italic;
      color: var(--accent-gold);
      width: 2rem;
      flex-shrink: 0;
    }

    .session-content { flex: 1; min-width: 0; }

    .session-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink-primary);
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }

    .session-tagline {
      font-size: 0.9375rem;
      color: var(--ink-tertiary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .session-voice {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-top: 0.375rem;
      display: block;
    }

    .session-arrow {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      color: var(--ink-muted);
      transition: all 0.3s ease;
    }
    .session-card:hover .session-arrow {
      color: var(--accent-gold);
      transform: translateX(4px);
    }

    /* SACRED CARD - special treatment */
    .session-card.sacred {
      background: linear-gradient(135deg, #faf3e6 0%, #f5e8d0 100%);
      border-color: #e8d4a8;
    }
    .session-card.sacred .session-numeral { color: var(--accent-gold-bright); }
    .session-card.sacred:hover { border-color: var(--accent-gold-bright); }

    /* SESSION (PLAY) SCREEN */
    .play-shell {
      min-height: 100vh;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom));
    }

    .play-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      color: var(--ink-secondary);
      transition: all 0.3s ease;
    }
    .icon-button:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--line-soft);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-secondary);
    }

    .play-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
    }

    /* BREATHING CIRCLE - refined */
    .breath-outer {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), var(--bg-elevated));
      border: 1px solid var(--line-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 30px 80px -30px rgba(93, 46, 63, 0.3), inset 0 2px 8px rgba(255, 255, 255, 0.6);
      position: relative;
    }
    .breath-outer::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px dashed var(--line-medium);
      opacity: 0.5;
    }

    .breath-inner-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-style: italic;
      font-weight: 400;
      color: var(--ink-secondary);
      letter-spacing: 0.02em;
    }

    .session-status {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 1.875rem);
      font-style: italic;
      font-weight: 500;
      color: var(--ink-primary);
      letter-spacing: -0.01em;
      line-height: 1.3;
      max-width: 28rem;
      min-height: 2.5rem;
    }

    .countdown {
      font-family: 'Inter Tight', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent-gold);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .voice-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: var(--bg-elevated);
      border: 1px solid var(--line-soft);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-secondary);
    }

    /* AUDIO PLAYER */
    .audio-section {
      width: 100%;
      max-width: 32rem;
      padding: 0 1rem;
    }

    audio {
      width: 100%;
      height: 56px;
      border-radius: 100px;
    }

    audio::-webkit-media-controls-panel {
      background-color: var(--bg-elevated);
    }

    .audio-help {
      text-align: center;
      margin-top: 0.875rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
    }

    /* Footer */
    .stream-footer {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink-tertiary);
      letter-spacing: 0.05em;
    }

    .stream-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a9b6e;
    }

    .home-footer {
      text-align: center;
      margin-top: 4rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.9375rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* Sacred theming for session view */
    .sacred-bg {
      background:
        radial-gradient(ellipse at 50% 10%, rgba(212, 161, 85, 0.15), transparent 60%),
        radial-gradient(ellipse at 0% 90%, rgba(184, 137, 58, 0.1), transparent 60%);
    }

    /* Affirmation theming - subtle warm wash */
    .affirmation-bg {
      background:
        radial-gradient(ellipse at 30% 0%, rgba(160, 64, 96, 0.08), transparent 50%),
        radial-gradient(ellipse at 70% 100%, rgba(184, 137, 58, 0.08), transparent 50%);
    }

    /* Section Number on play screen */
    .session-roman {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.5em;
      color: var(--accent-gold);
      text-transform: uppercase;
    }

  </style>
</head>
<body>

<div id="app"></div>

<script>
const CLOUD_URLS = {
  flute: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777437029/danamusic-relaxing-flute-meditation-416756_eri5yl.mp3",
  morning: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_41_47_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_tljw3f.mp3",
  afternoon: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_42_51_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_wvo0mh.mp3",
  evening: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436654/ElevenLabs_2026-04-29T03_43_31_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_yjm6ys.mp3",
  bonus: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436641/ElevenLabs_2026-04-29T03_19_28_Roger_-_Laid-Back_Casual_Resonant_pre_sp100_s50_sb75_se0_b_m2_tjzmxa.mp3",
  sacred: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777519525/%E5%8D%97%E6%97%A0%E6%9C%AC%E5%B8%88%E9%87%8A%E8%BF%A6%E7%89%9F%E5%B0%BC%E4%BD%9B_%E4%BD%9B%E5%8F%B7_Group_Performance_Version_%E8%A1%A8%E6%BC%94%E7%89%88_xfaryg.mp3",
};

const SESSIONS = [
  { id: "morning", numeral: "I", name: "Morning", tagline: "To activate wealth & vitality", voiceUrl: CLOUD_URLS.morning, voiceLabel: "Victoria" },
  { id: "afternoon", numeral: "II", name: "Afternoon", tagline: "A pause for power & focus", voiceUrl: CLOUD_URLS.afternoon, voiceLabel: "Victoria" },
  { id: "evening", numeral: "III", name: "Evening", tagline: "Rest, heal & multiply", voiceUrl: CLOUD_URLS.evening, voiceLabel: "Victoria" },
  { id: "bonus", numeral: "IV", name: "Grounding", tagline: "Deep grounding & inner power", voiceUrl: CLOUD_URLS.bonus, voiceLabel: "Roger" },
  { id: "sacred", numeral: "V", name: "Sacred", tagline: "南无本师释迦牟尼佛 · Devotional chant", voiceUrl: CLOUD_URLS.sacred, voiceLabel: "Buddhist Chant" },
];

const state = {
  activeSession: null,
  isPlaying: false,
  introTimer: null,
  voiceStartTimer: null,
  outroTimer: null,
};

let fluteAudio = null;
let voiceAudio = null;

function initFlute() {
  if (!fluteAudio) {
    fluteAudio = new Audio(CLOUD_URLS.flute);
    fluteAudio.loop = true;
    fluteAudio.volume = 0.45;
  }
}

function clearAllTimers() {
  if (state.introTimer) { clearInterval(state.introTimer); state.introTimer = null; }
  if (state.voiceStartTimer) { clearTimeout(state.voiceStartTimer); state.voiceStartTimer = null; }
  if (state.outroTimer) { clearTimeout(state.outroTimer); state.outroTimer = null; }
}

function stopAllAudio() {
  clearAllTimers();
  if (fluteAudio) {
    fluteAudio.pause();
    fluteAudio.currentTime = 0;
  }
  if (voiceAudio) {
    voiceAudio.pause();
  }
  state.isPlaying = false;
}

const app = document.getElementById("app");

function renderHome() {
  app.innerHTML = `
    <div class="app-shell">

      <div class="fade-up stagger-1" style="text-align: center; margin-bottom: 2.5rem;">
        <div class="eyebrow" style="margin-bottom: 1.5rem;">— Daily Practice —</div>
        <h1 class="display-title">
          I am rich.<br/><em>I am healthy.</em>
        </h1>
        <div class="ornament" style="max-width: 16rem; margin-left: auto; margin-right: auto; margin-top: 1.5rem;">
          <div class="ornament-line"></div>
          <div class="ornament-dot"></div>
          <div class="ornament-line"></div>
        </div>
        <p style="font-family: 'Fraunces', serif; font-style: italic; font-size: 1.125rem; color: var(--ink-tertiary); letter-spacing: 0.02em; margin-top: 0.5rem;">
          Your sanctuary for affirmations
        </p>
      </div>

      <div class="fade-up stagger-2" style="margin-bottom: 1rem;">
        <div class="eyebrow" style="margin-bottom: 0.875rem;">Sessions · ${SESSIONS.length}</div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 0.75rem;">
        ${SESSIONS.map((s, i) => {
          const isSacred = s.id === "sacred";
          return `
            <button onclick="enterSession('${s.id}')" class="session-card fade-up stagger-${i + 3} ${isSacred ? 'sacred' : ''}">
              <div class="session-numeral">${s.numeral}</div>
              <div class="session-content">
                <div class="session-name">${s.name}</div>
                <div class="session-tagline">${s.tagline}</div>
                <span class="session-voice">${s.voiceLabel}</span>
              </div>
              <span class="session-arrow">→</span>
            </button>
          `;
        }).join("")}
      </div>

      <p class="home-footer fade-up stagger-7">— and so it is —</p>
    </div>
  `;
}

function renderSession() {
  const session = SESSIONS.find(s => s.id === state.activeSession);
  if (!session) return renderHome();
  const isSacred = session.id === "sacred";

  app.innerHTML = `
    <div class="play-shell ${isSacred ? 'sacred-bg' : 'affirmation-bg'}">

      <div class="play-header fade-up stagger-1">
        <button onclick="exitSession()" class="icon-button" aria-label="Back">‹</button>
        <div class="session-badge">${session.numeral} · ${session.name}</div>
        <div class="icon-button" style="border-color: transparent; background: transparent;"></div>
      </div>

      <div class="play-content">

        <div class="fade-up stagger-2">
          <div class="breath-outer breath-circle">
            ${isSacred
              ? `<div style="font-size: 5rem;">✦</div>`
              : `<span id="breathText" class="breath-inner-text">breathe in</span>`
            }
          </div>
        </div>

        <div class="fade-up stagger-3" style="display: flex; flex-direction: column; gap: 0.875rem; align-items: center;">
          <p id="sessionStatus" class="session-status">
            ${isSacred ? "May all beings be at peace" : "Press play to begin"}
          </p>
          <p id="countdown" class="countdown" style="display: none;"></p>
        </div>

        <div class="fade-up stagger-4">
          <div class="voice-label">
            <span style="color: var(--accent-gold);">●</span>
            ${session.voiceLabel}
          </div>
        </div>

        <div class="audio-section fade-up stagger-5">
          <audio id="voiceAudio" controls preload="auto">
            <source src="${session.voiceUrl}" type="audio/mpeg" />
            <source src="${session.voiceUrl}" type="audio/mp3" />
            Your browser doesn't support audio.
          </audio>
          <p class="audio-help">
            ${isSacred ? "— listen with reverence —" : "— 10s flute · voice · 10s flute —"}
          </p>
        </div>

        <div class="stream-footer fade-up stagger-6">
          <div class="stream-dot"></div>
          Streaming from cloud
        </div>

      </div>
    </div>
  `;

  voiceAudio = document.getElementById("voiceAudio");

  voiceAudio.addEventListener("play", () => handleVoicePlay(isSacred));
  voiceAudio.addEventListener("pause", () => {
    if (voiceAudio.ended) return;
    handleVoicePause();
  });
  voiceAudio.addEventListener("ended", () => handleVoiceEnded(isSacred));

  if (!isSacred) {
    let breathing = "in";
    if (window.breathInterval) clearInterval(window.breathInterval);
    window.breathInterval = setInterval(() => {
      breathing = breathing === "in" ? "out" : "in";
      const el = document.getElementById("breathText");
      if (el) el.textContent = `breathe ${breathing}`;
    }, 4500);
  }
}

// When the user taps play on the audio element, intercept it for affirmations.
// For sacred chant, just play directly.
function handleVoicePlay(isSacred) {
  if (state.isPlaying) return; // already in flow
  state.isPlaying = true;

  if (isSacred) {
    // Play directly, no flute layer
    return;
  }

  // For affirmations: pause voice, start flute, play voice after 10s
  voiceAudio.pause();

  initFlute();
  fluteAudio.currentTime = 0;
  fluteAudio.play().catch(() => {});

  const statusEl = document.getElementById("sessionStatus");
  const countdownEl = document.getElementById("countdown");
  if (statusEl) statusEl.textContent = "Settling into stillness…";
  if (countdownEl) {
    countdownEl.style.display = "inline-block";
    let secondsLeft = 10;
    countdownEl.textContent = `Voice begins in ${secondsLeft}s`;
    state.introTimer = setInterval(() => {
      secondsLeft--;
      if (secondsLeft > 0) {
        countdownEl.textContent = `Voice begins in ${secondsLeft}s`;
      } else {
        countdownEl.style.display = "none";
        clearInterval(state.introTimer);
        state.introTimer = null;
      }
    }, 1000);
  }

  state.voiceStartTimer = setTimeout(() => {
    if (!state.isPlaying) return;
    voiceAudio.play().then(() => {
      const el = document.getElementById("sessionStatus");
      if (el) el.textContent = "Listen, breathe, receive";
    }).catch(err => {
      const el = document.getElementById("sessionStatus");
      if (el) el.textContent = "Voice could not play — try the player above";
      console.error(err);
    });
    state.voiceStartTimer = null;
  }, 10000);
}

function handleVoicePause() {
  // User manually paused
  clearAllTimers();
  if (fluteAudio) fluteAudio.pause();
  state.isPlaying = false;
  const el = document.getElementById("sessionStatus");
  const cd = document.getElementById("countdown");
  if (el) el.textContent = "Paused";
  if (cd) cd.style.display = "none";
}

function handleVoiceEnded(isSacred) {
  state.isPlaying = false;
  const statusEl = document.getElementById("sessionStatus");

  if (isSacred) {
    if (statusEl) statusEl.textContent = "🙏 Namo Buddhaya";
    return;
  }

  // 10-second flute outro for affirmation sessions
  if (statusEl) statusEl.textContent = "Carrying you gently…";
  const countdownEl = document.getElementById("countdown");
  if (countdownEl) {
    countdownEl.style.display = "inline-block";
    let secondsLeft = 10;
    countdownEl.textContent = `Closing in ${secondsLeft}s`;
    if (state.outroTimer) clearTimeout(state.outroTimer);
    state.outroTimer = setInterval(() => {
      secondsLeft--;
      if (secondsLeft > 0) {
        countdownEl.textContent = `Closing in ${secondsLeft}s`;
      } else {
        countdownEl.style.display = "none";
        clearInterval(state.outroTimer);
        state.outroTimer = null;
        if (fluteAudio) {
          fluteAudio.pause();
          fluteAudio.currentTime = 0;
        }
        const el = document.getElementById("sessionStatus");
        if (el) el.textContent = "Complete ✦";
      }
    }, 1000);
  }
}

function enterSession(id) {
  state.activeSession = id;
  state.isPlaying = false;
  renderSession();
}

function exitSession() {
  state.activeSession = null;
  stopAllAudio();
  if (window.breathInterval) clearInterval(window.breathInterval);
  renderHome();
}

renderHome();
</script>
