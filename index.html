<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Affirmations" />
  <meta name="theme-color" content="#fef3c7" />
  <title>I am rich. I am healthy. — Affirmation Sanctuary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    .font-serif-fancy {
      font-family: 'Cormorant Garamond', Georgia, serif;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.9); }
      50% { transform: scale(1.1); }
    }
    @keyframes breatheInner {
      0%, 100% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
    }
    .breath-circle { animation: breathe 8s ease-in-out infinite; }
    .breath-inner { animation: breatheInner 8s ease-in-out infinite; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    audio::-webkit-media-controls-panel {
      background-color: rgba(255, 255, 255, 0.5);
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-stone-50">

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CLOUD CONFIGURATION
// ═══════════════════════════════════════════════════════════════
const CLOUD_URLS = {
  flute: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777437029/danamusic-relaxing-flute-meditation-416756_eri5yl.mp3",
  morning: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_41_47_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_tljw3f.mp3",
  afternoon: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_42_51_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_wvo0mh.mp3",
  evening: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436654/ElevenLabs_2026-04-29T03_43_31_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_yjm6ys.mp3",
  bonus: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436641/ElevenLabs_2026-04-29T03_19_28_Roger_-_Laid-Back_Casual_Resonant_pre_sp100_s50_sb75_se0_b_m2_tjzmxa.mp3",
};

const BUILT_IN_SESSIONS = [
  { id: "morning", name: "Morning", icon: "☀️", tagline: "Activate wealth & health", gradient: "from-amber-200 via-rose-200 to-orange-300", voiceUrl: CLOUD_URLS.morning, voiceLabel: "Victoria", builtIn: true },
  { id: "afternoon", name: "Afternoon", icon: "⛅", tagline: "Power & focus reset", gradient: "from-sky-200 via-cyan-200 to-teal-300", voiceUrl: CLOUD_URLS.afternoon, voiceLabel: "Victoria", builtIn: true },
  { id: "evening", name: "Evening", icon: "🌙", tagline: "Rest, heal & multiply", gradient: "from-indigo-300 via-purple-300 to-slate-400", voiceUrl: CLOUD_URLS.evening, voiceLabel: "Victoria", builtIn: true },
  { id: "bonus", name: "Bonus", icon: "💗", tagline: "Deep grounding & inner power", gradient: "from-rose-300 via-pink-300 to-fuchsia-400", voiceUrl: CLOUD_URLS.bonus, voiceLabel: "Roger", builtIn: true },
];

const DAILY_WISDOM = [
  { text: "I am safe. All is well in my world.", source: "Affirmation" },
  { text: "Money flows to me freely and abundantly.", source: "Affirmation" },
  { text: "Every cell in my body radiates with health.", source: "Affirmation" },
  { text: "I am worthy of all the good coming to me today.", source: "Affirmation" },
  { text: "I trust the journey, even when I cannot see the path.", source: "Affirmation" },
  { text: "What we are aiming for is not to avoid life's storms, but to find the middle path.", source: "Wisdom" },
  { text: "The wound is the place where the Light enters you.", source: "Rumi" },
  { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", source: "Rumi" },
  { text: "Out beyond ideas of right and wrong, there is a field. I'll meet you there.", source: "Rumi" },
  { text: "What you seek is seeking you.", source: "Rumi" },
  { text: "The quieter you become, the more you can hear.", source: "Ram Dass" },
  { text: "We are all just walking each other home.", source: "Ram Dass" },
  { text: "Be here now.", source: "Ram Dass" },
  { text: "The journey of a thousand miles begins with a single step.", source: "Lao Tzu" },
  { text: "When I let go of what I am, I become what I might be.", source: "Lao Tzu" },
  { text: "Nature does not hurry, yet everything is accomplished.", source: "Lao Tzu" },
  { text: "Health is the greatest wealth.", source: "Wisdom" },
  { text: "I am exactly where I need to be, doing exactly what I need to do.", source: "Affirmation" },
  { text: "My income increases constantly.", source: "Affirmation" },
  { text: "I forgive myself for not knowing what I didn't know before I learned it.", source: "Affirmation" },
  { text: "The present moment is the only moment available to us.", source: "Thich Nhat Hanh" },
  { text: "Smile, breathe, and go slowly.", source: "Thich Nhat Hanh" },
  { text: "Walk as if you are kissing the Earth with your feet.", source: "Thich Nhat Hanh" },
  { text: "I am healing. I am whole. I am home.", source: "Affirmation" },
  { text: "I am a magnet for prosperity.", source: "Affirmation" },
  { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", source: "Emerson" },
  { text: "The only journey is the one within.", source: "Rilke" },
  { text: "Let yourself be silently drawn by the strange pull of what you really love.", source: "Rumi" },
  { text: "I release everything I no longer need.", source: "Affirmation" },
  { text: "Today I move with confidence. Today I am unstoppable.", source: "Affirmation" },
  { text: "Be soft. Do not let the world make you hard.", source: "Wisdom" },
  { text: "This too shall pass.", source: "Wisdom" },
  { text: "I am loved beyond measure. I am loved without condition.", source: "Affirmation" },
];

function getTodaysWisdom() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return DAILY_WISDOM[dayOfYear % DAILY_WISDOM.length];
}

// ═══════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════
const state = {
  activeSession: null,
  customSessions: JSON.parse(localStorage.getItem("affirmation-custom") || "[]"),
  fluteVol: parseInt(localStorage.getItem("flute-vol") || "45"),
  voiceVol: parseInt(localStorage.getItem("voice-vol") || "95"),
  waterVol: 35,
  masterMuted: false,
  todaysQuote: getTodaysWisdom(),
  showSetup: false,
  showAdd: false,
  waterFile: null,
  waterUrl: null,
};

function saveCustom() {
  localStorage.setItem("affirmation-custom", JSON.stringify(state.customSessions));
}
function saveVolumes() {
  localStorage.setItem("flute-vol", state.fluteVol);
  localStorage.setItem("voice-vol", state.voiceVol);
}

function getAllSessions() {
  return [...BUILT_IN_SESSIONS, ...state.customSessions];
}

// ═══════════════════════════════════════════════════════════════
// AUDIO MANAGEMENT
// ═══════════════════════════════════════════════════════════════
let fluteAudio = null;
let waterAudio = null;

function initFlute() {
  if (!fluteAudio) {
    fluteAudio = new Audio(CLOUD_URLS.flute);
    fluteAudio.loop = true;
    fluteAudio.preload = "auto";
  }
  fluteAudio.volume = state.masterMuted ? 0 : state.fluteVol / 100;
}

function initWater() {
  if (state.waterUrl && !waterAudio) {
    waterAudio = new Audio(state.waterUrl);
    waterAudio.loop = true;
    waterAudio.preload = "auto";
  }
  if (waterAudio) waterAudio.volume = state.masterMuted ? 0 : state.waterVol / 100;
}

function playBackground() {
  initFlute();
  initWater();
  if (fluteAudio) fluteAudio.play().catch(e => console.log("Flute:", e));
  if (waterAudio) waterAudio.play().catch(e => console.log("Water:", e));
}

function pauseBackground() {
  if (fluteAudio) fluteAudio.pause();
  if (waterAudio) waterAudio.pause();
}

function stopAllAudio() {
  pauseBackground();
  if (fluteAudio) { fluteAudio.currentTime = 0; }
  if (waterAudio) { waterAudio.currentTime = 0; }
}

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
const app = document.getElementById("app");

function renderHome() {
  const sessions = getAllSessions();
  app.innerHTML = `
    <div class="min-h-screen w-full bg-gradient-to-br from-stone-50 via-amber-50 to-rose-50 relative overflow-hidden">
      <div class="absolute top-0 -left-20 w-96 h-96 bg-rose-200/40 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute bottom-0 -right-20 w-96 h-96 bg-amber-200/40 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute top-1/3 right-1/4 w-64 h-64 bg-fuchsia-200/30 rounded-full blur-3xl pointer-events-none"></div>

      <div class="relative z-10 max-w-2xl mx-auto px-6 py-10 sm:py-14" style="padding-top: max(2.5rem, var(--safe-top));">
        <div class="flex justify-end mb-4">
          <button onclick="state.showSetup = true; renderHome();" class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/70 backdrop-blur-sm border border-white shadow-sm hover:shadow-md transition-all text-sm text-stone-700">
            ⚙️ Settings
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          </button>
        </div>

        <div class="text-center mb-8 fade-in">
          <div class="inline-flex items-center gap-2 mb-6 px-4 py-1.5 rounded-full bg-white/60 backdrop-blur-sm border border-white">
            <span class="text-amber-600">✨</span>
            <span class="text-xs tracking-[0.2em] uppercase text-stone-700 font-medium">Daily Practice</span>
          </div>
          <h1 class="font-serif-fancy text-5xl sm:text-6xl text-stone-800 mb-4 leading-tight">
            I am rich.<br /><em class="italic text-rose-700/80">I am healthy.</em>
          </h1>
          <p class="text-stone-600 text-base font-light tracking-wide">Your sanctuary for affirmations</p>
        </div>

        <div class="mb-8 p-6 rounded-3xl bg-gradient-to-br from-amber-50/90 to-rose-50/90 backdrop-blur-md border border-amber-200/50 shadow-lg fade-in">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-amber-700">✨</span>
              <span class="text-xs tracking-[0.2em] uppercase text-amber-900 font-medium">Today's Wisdom</span>
            </div>
            <button onclick="refreshQuote()" class="w-8 h-8 rounded-full bg-white/60 hover:bg-white flex items-center justify-center text-stone-600 hover:text-stone-800 transition-colors" title="New wisdom">
              🔄
            </button>
          </div>
          <p class="font-serif-fancy text-lg sm:text-xl text-stone-800 leading-relaxed italic mb-2">
            "${state.todaysQuote.text}"
          </p>
          <p class="text-xs text-stone-500 tracking-wide text-right">— ${state.todaysQuote.source}</p>
        </div>

        <div class="space-y-3 fade-in">
          ${sessions.map(s => {
            const isBonus = s.id === "bonus";
            const isCustom = !s.builtIn;
            const cardClass = isBonus
              ? "bg-gradient-to-r from-rose-50/90 via-pink-50/90 to-fuchsia-50/90 border-rose-200"
              : isCustom
              ? "bg-gradient-to-r from-violet-50/90 to-purple-50/90 border-violet-200"
              : "bg-white/70 border-white";
            const badgeClass = isBonus
              ? "bg-rose-700 text-white"
              : isCustom
              ? "bg-violet-700 text-white"
              : "bg-stone-200 text-stone-700";
            return `
              <button onclick="enterSession('${s.id}')" class="group w-full p-5 rounded-3xl backdrop-blur-md border shadow-lg hover:shadow-2xl transition-all duration-500 active:scale-[0.98] text-left flex items-center gap-5 ${cardClass}">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br ${s.gradient} flex items-center justify-center shadow-md text-3xl">
                  ${s.icon}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-serif-fancy text-2xl text-stone-800">${s.name}</span>
                    <span class="px-2 py-0.5 rounded-full text-[10px] tracking-widest uppercase font-medium ${badgeClass}">
                      ${s.voiceLabel}
                    </span>
                  </div>
                  <div class="text-sm text-stone-500 tracking-wide truncate">${s.tagline}</div>
                </div>
                <span class="text-stone-400 text-2xl">›</span>
              </button>
            `;
          }).join("")}

          <button onclick="state.showAdd = true; renderHome();" class="w-full p-5 rounded-3xl bg-white/40 backdrop-blur-md border-2 border-dashed border-stone-300 hover:border-violet-400 hover:bg-white/60 transition-all duration-300 text-left flex items-center gap-5">
            <div class="w-16 h-16 rounded-2xl bg-stone-100 flex items-center justify-center text-3xl text-stone-500">+</div>
            <div class="flex-1">
              <span class="font-serif-fancy text-xl text-stone-700">Add Affirmation</span>
              <div class="text-sm text-stone-500 tracking-wide">Paste any audio URL</div>
            </div>
          </button>
        </div>

        <p class="text-center text-xs text-stone-400 mt-10 tracking-widest uppercase">And so it is</p>
      </div>

      ${state.showSetup ? renderSetupModal() : ""}
      ${state.showAdd ? renderAddModal() : ""}
    </div>
  `;
}

function renderSetupModal() {
  return `

      <div class="w-full max-w-md bg-gradient-to-br from-stone-50 to-amber-50 rounded-3xl shadow-2xl border border-white p-6 sm:p-8 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif-fancy text-2xl text-stone-800">Settings</h2>
          <button onclick="state.showSetup = false; renderHome();" class="w-9 h-9 rounded-full bg-stone-200 flex items-center justify-center text-stone-700 hover:bg-stone-300">✕</button>

        <div class="mb-6 p-4 rounded-2xl bg-gradient-to-br from-emerald-50 to-sky-50 border border-emerald-200">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-emerald-700">☁️</span>
            <span class="text-sm font-medium text-emerald-900">Cloud Audio Connected</span>
            <span class="ml-auto w-2 h-2 rounded-full bg-emerald-500"></span>
          </div>
          <p class="text-xs text-emerald-800/80 leading-relaxed">
            All built-in voices and flute load from your Cloudinary cloud.
          </p>
        </div>

        ${state.customSessions.length > 0 ? `
          <div class="mb-6">
            <h3 class="text-xs tracking-[0.2em] uppercase text-stone-500 font-medium mb-3">Your Custom Affirmations</h3>
            <div class="space-y-2">
              ${state.customSessions.map(s => `
                <div class="flex items-center gap-2 p-3 rounded-xl bg-white/70 border border-white">
                  <span class="text-violet-700">⭐</span>
                  <span class="flex-1 text-sm text-stone-700 truncate">${s.name}</span>
                  <button onclick="removeCustom('${s.id}')" class="px-2 py-1 rounded-lg bg-stone-200 hover:bg-red-200 text-stone-600 hover:text-red-700">
                    🗑
                  </button>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}

        <div class="mb-6">
          <h3 class="text-xs tracking-[0.2em] uppercase text-stone-500 font-medium mb-3">Default Volumes</h3>
          <div class="p-4 rounded-2xl bg-white/70 border border-white space-y-3">
            <div>
              <div class="flex items-center justify-between text-xs text-stone-600 mb-1">
                <span>🎵 Flute</span><span>${state.fluteVol}%</span>
              </div>
              <input type="range" min="0" max="100" value="${state.fluteVol}" oninput="state.fluteVol = +this.value; saveVolumes(); if(fluteAudio) fluteAudio.volume = state.masterMuted ? 0 : this.value/100;" class="w-full accent-amber-700" />
            </div>
            <div>
              <div class="flex items-center justify-between text-xs text-stone-600 mb-1">
                <span>🎙 Voice</span><span>${state.voiceVol}%</span>
              </div>
              <input type="range" min="0" max="100" value="${state.voiceVol}" oninput="state.voiceVol = +this.value; saveVolumes();" class="w-full accent-rose-700" />
            </div>
          </div>
        </div>

        <button onclick="state.showSetup = false; renderHome();" class="w-full py-3 rounded-xl bg-stone-800 text-white font-medium tracking-wide hover:bg-stone-900 transition-colors">Done</button>
      </div>
    </div>
  `;
}

function renderAddModal() {
  return `
    <div class="fixed inset-0 z-50 bg-stone-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4" onclick="if(event.target === this) { state.showAdd = false; renderHome(); }">
      <div class="w-full max-w-md bg-gradient-to-br from-stone-50 to-violet-50 rounded-3xl shadow-2xl border border-white p-6 sm:p-8 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif-fancy text-2xl text-stone-800">Add Affirmation</h2>
          <button onclick="state.showAdd = false; renderHome();" class="w-9 h-9 rounded-full bg-stone-200 flex items-center justify-center text-stone-700 hover:bg-stone-300">✕</button>
        </div>

        <p class="text-sm text-stone-600 mb-5 leading-relaxed">
          Paste a Cloudinary URL (or any public mp3 link) to add a new affirmation card.

        <div class="space-y-4">

            <label class="block text-xs tracking-wider uppercase text-stone-500 font-medium mb-1.5">Name</label>

          </div>

          <div>
            <label class="block text-xs tracking-wider uppercase text-stone-500 font-medium mb-1.5">Tagline</label>

          </div>

          <div>
            <label class="block text-xs tracking-wider uppercase text-stone-500 font-medium mb-1.5">🔗 Audio URL</label>
            <input id="newUrl" type="url" placeholder="https://res.cloudinary.com/..." class="w-full px-4 py-3 rounded-xl bg-white border border-stone-200 focus:border-violet-400 focus:outline-none text-stone-800 text-sm" />
            <p class="text-xs text-stone-500 mt-2 leading-relaxed">
              💡 Upload to your Cloudinary, copy the URL, paste it here.

        <button onclick="addCustomSession()" class="w-full mt-6 py-3 rounded-xl bg-violet-700 text-white font-medium tracking-wide hover:bg-violet-800 transition-colors">
          Add to Home Screen
        </button>
      </div>
    </div>
  `;
}

function renderSession() {
  const session = getAllSessions().find(s => s.id === state.activeSession);
  if (!session) return renderHome();

  app.innerHTML = `
    <div class="min-h-screen w-full bg-gradient-to-br ${session.gradient} relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-t from-white/20 via-transparent to-white/10 pointer-events-none"></div>
      <div class="absolute inset-0 opacity-30 pointer-events-none" style="background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 40%);"></div>

      <div class="relative z-10 flex items-center justify-between px-6" style="padding-top: max(2rem, var(--safe-top));">
        <button onclick="exitSession()" class="w-11 h-11 rounded-full bg-white/40 backdrop-blur-md border border-white/50 flex items-center justify-center hover:bg-white/60 transition-all text-stone-800">‹</button>

        <div class="flex items-center gap-2 text-stone-800/80">
          <span>${session.icon}</span>
          <span class="text-sm tracking-[0.2em] uppercase font-medium">${session.name}</span>
        </div>

        <div class="flex gap-2">
          <button onclick="toggleMute()" class="w-11 h-11 rounded-full bg-white/40 backdrop-blur-md border border-white/50 flex items-center justify-center hover:bg-white/60 transition-all">
            ${state.masterMuted ? "🔇" : "🔊"}
          </button>
        </div>
      </div>

      <div class="relative z-10 flex flex-col items-center justify-center px-6 py-8" style="min-height: calc(100vh - 80px);">
        <div class="relative mb-6">
          <div class="breath-circle w-48 h-48 sm:w-64 sm:h-64 rounded-full bg-white/30 backdrop-blur-xl border-2 border-white/50 flex items-center justify-center shadow-2xl">
            <div class="breath-inner w-36 h-36 sm:w-48 sm:h-48 rounded-full bg-white/40 backdrop-blur flex items-center justify-center">
              <span id="breathText" class="font-serif-fancy text-xl text-stone-700 italic tracking-wide">breathe in</span>
            </div>
          </div>
        </div>

        <div class="max-w-xl text-center mb-4 px-4">
          <p id="sessionState" class="font-serif-fancy text-xl sm:text-2xl text-stone-800 leading-snug italic">
            Press play to begin
          </p>
        </div>

        <div class="flex items-center gap-2 mb-4 text-xs text-stone-700/60 tracking-widest uppercase">
          🎙 ${session.voiceLabel}
        </div>

        <div class="w-full max-w-md px-4 mb-4">
          <audio id="voiceAudio" controls preload="auto" class="w-full" style="height: 44px; border-radius: 22px;">
            <source src="${session.voiceUrl}" type="audio/mpeg" />
            <source src="${session.voiceUrl}" type="audio/mp3" />
            Your browser doesn't support audio.
          </audio>
          <p class="text-[10px] text-stone-700/60 text-center mt-1.5 tracking-wider uppercase">
            Tap play • flute layers in automatically
          </p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4 px-4 py-3 rounded-2xl bg-white/40 backdrop-blur-md border border-white/50 max-w-md">
          <div class="flex items-center gap-2">
            <span class="text-stone-700">🎵</span>
            <input type="range" min="0" max="100" value="${state.fluteVol}" oninput="state.fluteVol = +this.value; saveVolumes(); if(fluteAudio) fluteAudio.volume = state.masterMuted ? 0 : this.value/100;" class="w-20 sm:w-24 accent-stone-800" />
          </div>
        </div>

        <div class="flex items-center gap-1.5 mt-4 text-xs text-stone-700/60">
          ☁️ <span class="tracking-wide">Streaming from cloud</span>
        </div>
      </div>
    </div>
  `;

  // Bind audio events
  const audio = document.getElementById("voiceAudio");
  audio.volume = state.masterMuted ? 0 : state.voiceVol / 100;
  audio.addEventListener("play", () => {
    document.getElementById("sessionState").textContent = "Listen, breathe, receive";
    playBackground();
  });
  audio.addEventListener("pause", () => {
    document.getElementById("sessionState").textContent = "Press play to begin";
    pauseBackground();
  });
  audio.addEventListener("ended", () => {
    document.getElementById("sessionState").textContent = "Complete ✨";
    pauseBackground();
  });
  audio.addEventListener("error", (e) => {
    console.error("Audio error:", e.target.error);
    document.getElementById("sessionState").textContent = "Audio error — check connection";
  });

  // Breathing text alternator
  let breathing = "in";
  if (window.breathInterval) clearInterval(window.breathInterval);
  window.breathInterval = setInterval(() => {
    breathing = breathing === "in" ? "out" : "in";
    const el = document.getElementById("breathText");
    if (el) el.textContent = `breathe ${breathing}`;
  }, 4000);
}

// ═══════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function enterSession(id) {
  state.activeSession = id;
  renderSession();
}

function exitSession() {
  state.activeSession = null;
  stopAllAudio();
  if (window.breathInterval) clearInterval(window.breathInterval);
  renderHome();
}

function toggleMute() {
  state.masterMuted = !state.masterMuted;
  if (fluteAudio) fluteAudio.volume = state.masterMuted ? 0 : state.fluteVol / 100;
  if (waterAudio) waterAudio.volume = state.masterMuted ? 0 : state.waterVol / 100;
  const audio = document.getElementById("voiceAudio");
  if (audio) audio.volume = state.masterMuted ? 0 : state.voiceVol / 100;
  renderSession();
}

function refreshQuote() {
  let next = state.todaysQuote;
  while (next === state.todaysQuote && DAILY_WISDOM.length > 1) {
    next = DAILY_WISDOM[Math.floor(Math.random() * DAILY_WISDOM.length)];
  }
  state.todaysQuote = next;
  renderHome();
}

function addCustomSession() {
  const name = document.getElementById("newName").value.trim();
  const tagline = document.getElementById("newTagline").value.trim();
  const url = document.getElementById("newUrl").value.trim();
  if (!name || !url) {
    alert("Please enter at least a name and URL");
    return;
  }
  const newSession = {
    id: `custom-${Date.now()}`,
    name,
    icon: "⭐",
    tagline: tagline || "Custom affirmation",
    gradient: "from-violet-200 via-purple-200 to-indigo-300",
    voiceUrl: url,
    voiceLabel: "Custom",
    builtIn: false,
  };
  state.customSessions.push(newSession);
  saveCustom();
  state.showAdd = false;
  renderHome();
}

function removeCustom(id) {
  if (!confirm("Remove this affirmation?")) return;
  state.customSessions = state.customSessions.filter(s => s.id !== id);
  saveCustom();
  renderHome();
}

// ═══════════════════════════════════════════════════════════════
// INITIAL RENDER
// ═══════════════════════════════════════════════════════════════
renderHome();
</script>
</body>
</html>
