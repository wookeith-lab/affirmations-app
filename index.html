<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sanctuary" />
  <meta name="theme-color" content="#161a12" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>Sanctuary — Daily Affirmations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);

      /* DEEPER background, BRIGHTER text = max contrast for eyesight */
      --bg-deep: #161a12;
      --bg-mid: #232818;
      --bg-card: #2d3320;
      --bg-card-hover: #383f28;
      --linen: #f4eedb;          /* BRIGHTER linen */
      --linen-soft: #e0d8c0;
      --linen-mute: #aba590;
      --brass: #e0b85c;          /* BRIGHTER brass */
      --brass-glow: #f0c870;
      --rose-soft: #d99090;       /* BRIGHTER rose */
      --line: rgba(244, 238, 219, 0.18);
      --line-strong: rgba(244, 238, 219, 0.32);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg-deep);
      color: var(--linen);
      font-family: 'Inter Tight', -apple-system, sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
      font-size: 17px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(224, 184, 92, 0.10), transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(217, 144, 144, 0.07), transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%, 100% { transform: scale(0.92); } 50% { transform: scale(1.08); } }
    .fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
    .breath-circle { animation: breathe 9s ease-in-out infinite; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.15s; }
    .stagger-3 { animation-delay: 0.25s; }
    .stagger-4 { animation-delay: 0.35s; }
    .stagger-5 { animation-delay: 0.45s; }
    .stagger-6 { animation-delay: 0.55s; }
    .stagger-7 { animation-delay: 0.65s; }
    .stagger-8 { animation-delay: 0.75s; }
    .app-shell { position: relative; z-index: 2; max-width: 680px; margin: 0 auto; padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom)); }

    /* BIGGER eyebrow */
    .eyebrow {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--brass);
    }

    /* MUCH BIGGER display title */
    .display-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: clamp(4rem, 14vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--linen);
    }
    .display-title em {
      font-style: italic;
      font-weight: 500;
      color: var(--rose-soft);
    }

    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }

    /* BIGGER pill button */
    .pill-button {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.875rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--linen);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
    }
    .pill-button:hover { border-color: var(--brass); color: var(--brass); }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #94c179; box-shadow: 0 0 10px rgba(148, 193, 121, 0.7); }

    .ornament { display: flex; align-items: center; gap: 1rem; margin: 1.75rem auto; max-width: 18rem; }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--line-strong), transparent); }
    .ornament-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brass); box-shadow: 0 0 8px rgba(224, 184, 92, 0.5); }

    /* BIGGER subtitle */
    .subtitle {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.375rem;
      color: var(--linen-soft);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    /* BIGGER wisdom card */
    .wisdom-card {
      background: var(--bg-mid);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2.25rem;
      margin: 2rem 0;
      position: relative;
      overflow: hidden;
    }
    .wisdom-card::before {
      content: '"';
      position: absolute;
      top: -3.5rem;
      left: 0.5rem;
      font-family: 'Fraunces', serif;
      font-size: 13rem;
      color: var(--brass);
      opacity: 0.12;
      line-height: 1;
      pointer-events: none;
    }
    .wisdom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .wisdom-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.75rem;
      font-style: italic;
      font-weight: 500;
      line-height: 1.4;
      color: var(--linen);
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }
    .wisdom-source {
      text-align: right;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--brass);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .icon-btn-small {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-deep);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--linen-soft);
      transition: all 0.3s ease;
      font-size: 1.25rem;
    }
    .icon-btn-small:hover { color: var(--brass); border-color: var(--brass); transform: rotate(180deg); }

    .sessions-header { display: flex; justify-content: space-between; align-items: baseline; margin: 2rem 0 1.25rem; }

    /* BIGGER session cards */
    .session-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.75rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .session-card:hover { background: var(--bg-card-hover); border-color: var(--brass); transform: translateY(-2px); }
    .session-card:active { transform: translateY(0); }
    .session-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--brass), transparent);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }
    .session-card:hover::after { transform: scaleX(1); }

    /* BIGGER numerals */
    .session-numeral {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.25rem;
      font-style: italic;
      font-weight: 500;
      color: var(--brass);
      width: 2.75rem;
      flex-shrink: 0;
    }
    .session-content { flex: 1; min-width: 0; }

    /* BIGGER session names */
    .session-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--linen);
      line-height: 1.15;
      margin-bottom: 0.375rem;
    }

    /* BIGGER tagline */
    .session-tagline {
      font-size: 1.0625rem;
      color: var(--linen-soft);
      font-weight: 500;
      line-height: 1.4;
    }

    /* BIGGER voice label */
    .session-voice {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brass);
      margin-top: 0.625rem;
      display: block;
    }

    .session-arrow {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      color: var(--linen-mute);
      transition: all 0.3s ease;
    }
    .session-card:hover .session-arrow { color: var(--brass); transform: translateX(4px); }

    .session-card.sacred {
      background: linear-gradient(135deg, rgba(224, 184, 92, 0.15), rgba(224, 184, 92, 0.05));
      border-color: rgba(224, 184, 92, 0.35);
    }
    .session-card.custom {
      background: linear-gradient(135deg, rgba(217, 144, 144, 0.15), rgba(217, 144, 144, 0.05));
      border-color: rgba(217, 144, 144, 0.3);
    }
    .session-card.custom .session-numeral, .session-card.custom .session-voice { color: var(--rose-soft); }

    .add-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.75rem;
      background: transparent;
      border: 1.5px dashed var(--line-strong);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }
    .add-card:hover { border-color: var(--brass); border-style: solid; background: var(--bg-card); }
    .add-icon {
      font-family: 'Fraunces', serif;
      font-size: 2.5rem;
      color: var(--linen-mute);
      width: 2.75rem;
      text-align: center;
      flex-shrink: 0;
      font-weight: 500;
    }
    .add-card:hover .add-icon { color: var(--brass); }
    .add-text {
      font-family: 'Fraunces', serif;
      font-size: 1.875rem;
      color: var(--linen);
      font-style: italic;
      font-weight: 500;
    }
    .add-hint { font-size: 1rem; color: var(--linen-mute); margin-top: 0.25rem; }

    .play-shell { min-height: 100vh; position: relative; z-index: 2; display: flex; flex-direction: column; padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom)); }
    .play-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }

    /* BIGGER icon button */
    .icon-button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Fraunces', serif;
      font-size: 1.625rem;
      color: var(--linen);
      transition: all 0.3s ease;
    }
    .icon-button:hover { border-color: var(--brass); color: var(--brass); }

    /* BIGGER session badge */
    .session-badge {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 1.375rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 100px;
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--linen);
    }

    .play-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 2rem; }

    /* BIGGER breathing circle */
    .breath-outer {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--bg-card), var(--bg-mid));
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.7), inset 0 2px 8px rgba(244, 238, 219, 0.06);
      position: relative;
    }
    .breath-outer::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed var(--line-strong);
      opacity: 0.6;
    }

    /* BIGGER breath text */
    .breath-inner-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      font-style: italic;
      font-weight: 500;
      color: var(--linen);
      letter-spacing: 0.02em;
    }

    /* MUCH BIGGER session status */
    .session-status {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.875rem, 5vw, 2.5rem);
      font-style: italic;
      font-weight: 500;
      color: var(--linen);
      line-height: 1.3;
      max-width: 32rem;
      min-height: 3rem;
    }

    /* BIGGER voice label */
    .voice-label {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.875rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 100px;
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--linen);
    }

    .audio-section { width: 100%; max-width: 32rem; padding: 0 1rem; }

    /* BIGGER audio player */
    audio {
      width: 100%;
      height: 64px;
      border-radius: 100px;
      filter: invert(1) hue-rotate(180deg);
    }

    .audio-help {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--linen-mute);
    }

    .stream-footer {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--linen-soft);
      letter-spacing: 0.04em;
    }

    .home-footer {
      text-align: center;
      margin-top: 4rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--linen-soft);
    }

    /* MODAL with BIGGER text */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 1rem; }
    @media (min-width: 640px) { .modal-overlay { align-items: center; } }
    .modal {
      width: 100%;
      max-width: 30rem;
      background: var(--bg-mid);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 2.25rem;
      max-height: 90vh;
      overflow-y: auto;
      color: var(--linen);
    }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .modal-close {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--linen);
    }
    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--linen-mute);
      margin-bottom: 0.625rem;
    }
    .form-input {
      width: 100%;
      padding: 1.125rem 1.25rem;
      background: var(--bg-deep);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 1.0625rem;
      font-weight: 500;
      color: var(--linen);
      transition: border-color 0.2s ease;
    }
    .form-input::placeholder { color: var(--linen-mute); }
    .form-input:focus { outline: none; border-color: var(--brass); }
    .form-hint {
      font-size: 0.875rem;
      color: var(--linen-mute);
      margin-top: 0.625rem;
      font-style: italic;
    }
    .primary-btn {
      width: 100%;
      padding: 1.25rem;
      background: var(--brass);
      color: var(--bg-deep);
      border: none;
      border-radius: 6px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .primary-btn:hover { background: var(--brass-glow); }

    .custom-list { display: flex; flex-direction: column; gap: 0.625rem; }
    .custom-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.125rem 1.25rem;
      background: var(--bg-deep);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .custom-item .name {
      font-size: 1.0625rem;
      font-weight: 600;
    }
    .delete-btn {
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      color: var(--linen-soft);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .delete-btn:hover { background: rgba(217, 144, 144, 0.18); color: var(--rose-soft); border-color: var(--rose-soft); }

    .volume-row { display: flex; flex-direction: column; gap: 0.75rem; }
    .volume-header {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 700;
      color: var(--linen);
    }

    /* BIGGER, more visible volume slider */
    input[type="range"] {
      width: 100%;
      height: 8px;
      background: var(--line-strong);
      border-radius: 4px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--brass);
      cursor: pointer;
      border: 3px solid var(--bg-deep);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      appearance: none;
      -webkit-appearance: none;
    }
  </style>
</head>

];

function getTodaysWisdom() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return DAILY_WISDOM[dayOfYear % DAILY_WISDOM.length];
}

function romanize(num) {
  const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
  let result = '';
  for (const i in lookup) { while (num >= lookup[i]) { result += i; num -= lookup[i]; } }
  return result;
}

const state = {
  activeSession: null,
  customSessions: JSON.parse(localStorage.getItem("affirmation-custom") || "[]"),
  fluteVol: parseInt(localStorage.getItem("flute-vol") || "40"),
  todaysQuote: getTodaysWisdom(),
  showSetup: false,
  showAdd: false,
};

function saveCustom() { localStorage.setItem("affirmation-custom", JSON.stringify(state.customSessions)); }
function saveVolumes() { localStorage.setItem("flute-vol", state.fluteVol); }

function getAllSessions() {
  let custom = state.customSessions.map((s, i) => ({
    ...s,
    numeral: romanize(SESSIONS.length + i + 1),
    type: "affirmation",
    isCustom: true,
  }));
  return [...SESSIONS, ...custom];
}

const fluteEl = document.getElementById("fluteBackground");
const app = document.getElementById("app");

function renderHome() {
  const sessions = getAllSessions();
  app.innerHTML = `
    <div class="app-shell">
      <div class="top-bar fade-up stagger-1">
        <button onclick="state.showSetup = true; renderHome();" class="pill-button">
          ⚙ Settings <span class="status-dot"></span>
        </button>
      </div>
      <div class="fade-up stagger-2" style="text-align: center; margin-bottom: 1rem;">
        <div class="eyebrow" style="margin-bottom: 1.5rem;">— Daily Practice —</div>
        <h1 class="display-title">I am rich.<br/><em>I am healthy.</em></h1>
        <div class="ornament">
          <div class="ornament-line"></div>
          <div class="ornament-dot"></div>
          <div class="ornament-line"></div>
        </div>
        <p class="subtitle">Your sanctuary for affirmations</p>
      </div>
      <div class="wisdom-card fade-up stagger-3">
        <div class="wisdom-header">
          <div class="eyebrow">Today's Wisdom</div>
          <button onclick="refreshQuote()" class="icon-btn-small" title="New wisdom">↻</button>
        </div>
        <p class="wisdom-text">${state.todaysQuote.text}</p>
        <p class="wisdom-source">— ${state.todaysQuote.source}</p>
      </div>
      <div class="sessions-header fade-up stagger-4">
        <div class="eyebrow">Sessions</div>
        <div class="eyebrow" style="color: var(--linen-mute);">${sessions.length} total</div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 0.875rem;">
        ${sessions.map((s, i) => {
          const isSacred = s.id === "sacred";
          return `
            <button onclick="enterSession('${s.id}')" class="session-card fade-up stagger-${Math.min(i + 5, 8)} ${isSacred ? 'sacred' : ''} ${s.isCustom ? 'custom' : ''}">
              <div class="session-numeral">${s.numeral}</div>
              <div class="session-content">
                <div class="session-name">${s.name}</div>
                <div class="session-tagline">${s.tagline}</div>
                <span class="session-voice">${s.voiceLabel}</span>
              </div>
              <span class="session-arrow">→</span>
            </button>
          `;
        }).join("")}
        <button onclick="state.showAdd = true; renderHome();" class="add-card fade-up stagger-8">
          <div class="add-icon">+</div>
          <div class="session-content">
            <div class="add-text">Add Affirmation</div>
            <div class="add-hint">Paste any audio URL</div>
          </div>
        </button>
      </div>
      <p class="home-footer fade-up stagger-8">— and so it is —</p>
    </div>
    ${state.showSetup ? renderSetupModal() : ""}
    ${state.showAdd ? renderAddModal() : ""}
  `;
}

function renderSetupModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target === this) { state.showSetup = false; renderHome(); }">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem;">
          <h2 class="modal-title">Settings</h2>
          <button onclick="state.showSetup = false; renderHome();" class="modal-close">✕</button>
        </div>
        <div style="margin-bottom: 1.75rem; padding: 1.25rem 1.5rem; background: var(--bg-deep); border: 1px solid var(--line); border-radius: 6px;">
          <div style="display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.625rem;">
            <span class="status-dot"></span>
            <span style="font-size: 1.0625rem; font-weight: 700;">Cloud Audio Connected</span>
          </div>
          <p style="font-size: 0.9375rem; color: var(--linen-soft); line-height: 1.5;">All voices and flute load from your Cloudinary cloud.</p>
        </div>
        ${state.customSessions.length > 0 ? `
          <div style="margin-bottom: 1.75rem;">
            <div class="form-label">Your Custom Affirmations</div>
            <div class="custom-list">
              ${state.customSessions.map(s => `
                <div class="custom-item">
                  <span style="color: var(--rose-soft); font-size: 1.5rem; font-family: 'Fraunces', serif; font-style: italic;">${s.name.charAt(0)}</span>
                  <span class="name" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${s.name}</span>
                  <button onclick="removeCustom('${s.id}')" class="delete-btn">remove</button>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}
        <div style="margin-bottom: 1.75rem;">
          <div class="form-label" style="margin-bottom: 1.25rem;">Background Flute Volume</div>
          <div class="volume-row">
            <div class="volume-header">
              <span>Flute</span><span id="fluteVolDisplay">${state.fluteVol}%</span>
            </div>
            <input type="range" min="0" max="100" value="${state.fluteVol}" oninput="state.fluteVol = +this.value; saveVolumes(); fluteEl.volume = this.value/100; document.getElementById('fluteVolDisplay').textContent = this.value + '%';" />
          </div>
        </div>
        <button onclick="state.showSetup = false; renderHome();" class="primary-btn">Done</button>
      </div>
    </div>
  `;
}

function renderAddModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target === this) { state.showAdd = false; renderHome(); }">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem;">
          <h2 class="modal-title">Add Affirmation</h2>
          <button onclick="state.showAdd = false; renderHome();" class="modal-close">✕</button>
        </div>
        <p style="font-size: 1.0625rem; color: var(--linen-soft); line-height: 1.5; margin-bottom: 1.75rem;">
          Paste a Cloudinary URL or any public audio link.
        </p>
        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
          <div>
            <label class="form-label">Name</label>
            <input id="newName" type="text" class="form-input" placeholder="e.g. Healing, Sleep" />
          </div>
          <div>
            <label class="form-label">Tagline</label>
            <input id="newTagline" type="text" class="form-input" placeholder="A short description" />
          </div>
          <div>
            <label class="form-label">Audio URL</label>
            <input id="newUrl" type="url" class="form-input" placeholder="https://res.cloudinary.com/..." />
            <p class="form-hint">Upload to your Cloudinary, copy the URL, paste here.</p>
          </div>
        </div>
        <button onclick="addCustomSession()" class="primary-btn" style="margin-top: 1.75rem;">Add to Sanctuary</button>
      </div>
    </div>
  `;
}

function renderSession() {
  const session = getAllSessions().find(s => s.id === state.activeSession);
  if (!session) return renderHome();
  const isSacred = session.type === "devotional";

  app.innerHTML = `
    <div class="play-shell">
      <div class="play-header fade-up stagger-1">
        <button onclick="exitSession()" class="icon-button">‹</button>
        <div class="session-badge">${session.numeral} · ${session.name}</div>
        <div style="width: 52px;"></div>
      </div>
      <div class="play-content">
        <div class="fade-up stagger-2">
          <div class="breath-outer breath-circle">
            ${isSacred ? `<div style="font-size: 6rem; color: var(--brass);">✦</div>` : `<span id="breathText" class="breath-inner-text">breathe in</span>`}
          </div>
        </div>
        <div class="fade-up stagger-3">
          <p id="sessionStatus" class="session-status">${isSacred ? "May all beings be at peace" : "Press play to begin"}</p>
        </div>
        <div class="fade-up stagger-4">
          <div class="voice-label">
            <span style="color: var(--brass);">●</span>
            ${session.voiceLabel}
          </div>
        </div>
        <div class="audio-section fade-up stagger-5">
          <audio id="voiceAudio" controls preload="auto">
            <source src="${session.url}" type="audio/mpeg" />
          </audio>
          <p class="audio-help">${isSacred ? "— listen with reverence —" : "— flute layers in automatically —"}</p>
        </div>
        <div class="stream-footer fade-up stagger-6">
          <div class="status-dot"></div>
          Streaming from cloud
        </div>
      </div>
    </div>
  `;

  const voiceEl = document.getElementById("voiceAudio");
  if (fluteEl) fluteEl.volume = state.fluteVol / 100;

  voiceEl.addEventListener("play", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🪷 May this practice bring peace" : "Listen, breathe, receive";
    if (!isSacred && fluteEl) {
      fluteEl.currentTime = 0;
      fluteEl.play().catch(() => {});
    }
  });

  voiceEl.addEventListener("pause", () => {
    if (voiceEl.ended) return;
    document.getElementById("sessionStatus").textContent = "Paused";
    if (fluteEl) fluteEl.pause();
  });

  voiceEl.addEventListener("ended", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🙏 Namo Buddhaya" : "Complete ✦";
    if (fluteEl) {
      fluteEl.pause();
      fluteEl.currentTime = 0;
    }
  });

  if (!isSacred) {
    let breathing = "in";
    if (window.breathInterval) clearInterval(window.breathInterval);
    window.breathInterval = setInterval(() => {
      breathing = breathing === "in" ? "out" : "in";
      const el = document.getElementById("breathText");
      if (el) el.textContent = `breathe ${breathing}`;
    }, 4500);
  }
}

function refreshQuote() {
  let next = state.todaysQuote;
  while (next === state.todaysQuote && DAILY_WISDOM.length > 1) {
    next = DAILY_WISDOM[Math.floor(Math.random() * DAILY_WISDOM.length)];
  }
  state.todaysQuote = next;
  renderHome();
}

function addCustomSession() {
  const name = document.getElementById("newName").value.trim();
  const tagline = document.getElementById("newTagline").value.trim();
  const url = document.getElementById("newUrl").value.trim();
  if (!name || !url) { alert("Please enter at least a name and URL"); return; }
  state.customSessions.push({
    id: `custom-${Date.now()}`,
    name,
    tagline: tagline || "Custom affirmation",
    url,
    voiceLabel: "Custom",
  });
  saveCustom();
  state.showAdd = false;
  renderHome();
}

function removeCustom(id) {
  if (!confirm("Remove this affirmation?")) return;
  state.customSessions = state.customSessions.filter(s => s.id !== id);
  saveCustom();
  renderHome();
}

function enterSession(id) {
  state.activeSession = id;
  renderSession();
}

function exitSession() {
  state.activeSession = null;
  if (fluteEl) {
    fluteEl.pause();
    fluteEl.currentTime = 0;
  }
  if (window.breathInterval) clearInterval(window.breathInterval);
  renderHome();
}

renderHome();
</script>
</body>
</html>
