<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sanctuary" />
  <meta name="theme-color" content="#0e0823" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>Sanctuary — Daily Affirmations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);

      /* RICHER, DEEPER jewel tones */
      --bg-base: #0e0823;          /* Deeper midnight amethyst */
      --bg-elevated: #1a1238;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-hover: rgba(255, 255, 255, 0.10);

      --ink-bright: #ffffff;
      --ink-soft: #ede4f7;
      --ink-mute: #a896c4;

      /* Antique gold (richer) */
      --gold: #d4a83c;
      --gold-bright: #f4c558;
      --gold-glow: rgba(244, 197, 88, 0.55);

      /* Deep ruby coral */
      --ruby: #d63d5e;
      --ruby-soft: #e8607f;
      --ruby-glow: rgba(232, 96, 127, 0.45);

      /* Royal sapphire teal */
      --sapphire: #2d8a8a;
      --sapphire-bright: #4eb8b8;
      --sapphire-glow: rgba(78, 184, 184, 0.45);

      /* Deep magenta */
      --magenta: #a3358e;
      --magenta-bright: #c44bb8;
      --magenta-glow: rgba(196, 75, 184, 0.4);

      /* Warm amber sunset */
      --amber: #e07c33;
      --amber-bright: #ff9a4a;
      --amber-glow: rgba(255, 154, 74, 0.45);

      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.22);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg-base);
      color: var(--ink-bright);
      font-family: 'Inter Tight', -apple-system, sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
      font-size: 18px;          /* BIGGER base */
      overflow-x: hidden;
    }

    /* === AURORA BOREALIS animated gradient === */
    .aurora {
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.55;
    }
    .aurora-1 {
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, var(--ruby), transparent 70%);
      top: -10%; left: -10%;
      animation: aurora-drift-1 22s ease-in-out infinite;
    }
    .aurora-2 {
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, var(--magenta), transparent 70%);
      top: 10%; right: -20%;
      animation: aurora-drift-2 28s ease-in-out infinite;
    }
    .aurora-3 {
      width: 65vw; height: 65vw;
      background: radial-gradient(circle, var(--sapphire), transparent 70%);
      bottom: -20%; left: 20%;
      animation: aurora-drift-3 30s ease-in-out infinite;
    }
    .aurora-4 {
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, var(--gold), transparent 70%);
      bottom: 10%; right: 10%;
      animation: aurora-drift-4 26s ease-in-out infinite;
      opacity: 0.35;
    }

    @keyframes aurora-drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(8vw, 12vh) scale(1.15); }
      66%      { transform: translate(-4vw, 6vh) scale(0.95); }
    }
    @keyframes aurora-drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-10vw, 8vh) scale(1.2); }
    }
    @keyframes aurora-drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%      { transform: translate(6vw, -10vh) scale(1.1); }
      80%      { transform: translate(-6vw, -4vh) scale(1); }
    }
    @keyframes aurora-drift-4 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-8vw, -10vh) scale(1.25); }
    }

    /* Dark vignette over aurora to keep contrast for text */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(14, 8, 35, 0.65) 100%);
    }

    /* === FLOATING GOLD DUST PARTICLES === */
    .dust {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .dust-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-bright);
      box-shadow: 0 0 6px var(--gold-glow);
      opacity: 0;
      animation: dust-float 18s linear infinite;
    }
    @keyframes dust-float {
      0%   { transform: translateY(110vh) translateX(0) scale(0.5); opacity: 0; }
      10%  { opacity: 0.7; }
      50%  { transform: translateY(50vh) translateX(20px) scale(1); }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) translateX(-20px) scale(0.5); opacity: 0; }
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
    .fade-in { animation: fadeIn 0.6s ease backwards; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.15s; }
    .stagger-3 { animation-delay: 0.28s; }
    .stagger-4 { animation-delay: 0.41s; }
    .stagger-5 { animation-delay: 0.54s; }
    .stagger-6 { animation-delay: 0.67s; }
    .stagger-7 { animation-delay: 0.80s; }
    .stagger-8 { animation-delay: 0.93s; }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .app-shell { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom)); }

    /* BIGGER eyebrow */
    .eyebrow {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold-bright);
    }

    /* MUCH BIGGER display title */
    .display-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: clamp(5rem, 16vw, 7.5rem);
      line-height: 0.93;
      letter-spacing: -0.035em;
      color: var(--ink-bright);
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }
    .display-title em {
      font-style: italic;
      font-weight: 500;
      background: linear-gradient(90deg, var(--ruby-soft), var(--gold-bright), var(--amber-bright), var(--ruby-soft));
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 8s ease-in-out infinite;
    }

    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1.75rem; }

    .pill-button {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.625rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--ink-bright);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.4s ease;
    }
    .pill-button:hover {
      border-color: var(--gold);
      background: rgba(212, 168, 60, 0.18);
      box-shadow: 0 0 24px var(--gold-glow);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--sapphire-bright);
      box-shadow: 0 0 14px var(--sapphire-glow);
    }

    .ornament { display: flex; align-items: center; gap: 1.25rem; margin: 2rem auto; max-width: 22rem; }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .ornament-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold-bright);
      box-shadow: 0 0 14px var(--gold-glow);
    }

    .subtitle {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    /* WISDOM CARD */
    .wisdom-card {
      background: linear-gradient(135deg, rgba(196, 75, 184, 0.18), rgba(232, 96, 127, 0.12));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(244, 197, 88, 0.32);
      border-radius: 16px;
      padding: 2.5rem;
      margin: 2.25rem 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px -20px rgba(196, 75, 184, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .wisdom-card::before {
      content: '"';
      position: absolute;
      top: -3.5rem;
      left: 0.5rem;
      font-family: 'Fraunces', serif;
      font-size: 14rem;
      color: var(--gold-bright);
      opacity: 0.16;
      line-height: 1;
      pointer-events: none;
    }
    .wisdom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .wisdom-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      font-style: italic;
      font-weight: 500;
      line-height: 1.4;
      color: var(--ink-bright);
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }
    .wisdom-source {
      text-align: right;
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .icon-btn-small {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-soft);
      transition: all 0.4s ease;
      font-size: 1.375rem;
    }
    .icon-btn-small:hover {
      color: var(--gold-bright);
      border-color: var(--gold-bright);
      transform: rotate(180deg);
      background: rgba(244, 197, 88, 0.18);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .sessions-header { display: flex; justify-content: space-between; align-items: baseline; margin: 2.25rem 0 1.5rem; }

    /* SESSION CARDS */
    .session-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.625rem;
      padding: 2rem;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .session-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .session-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.5);
    }
    .session-card:hover::before { opacity: 1; }
    .session-card:active { transform: translateY(-1px); }
    .session-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      transform: scaleX(0);
      transition: transform 0.5s ease;
    }
    .session-card:hover::after { transform: scaleX(1); }

    /* MORNING — sunset amber */
    .session-card[data-id="morning"] { border-color: rgba(255, 154, 74, 0.32); }
    .session-card[data-id="morning"]:hover { border-color: var(--amber-bright); box-shadow: 0 24px 60px -20px var(--amber-glow), 0 0 30px var(--amber-glow); }
    .session-card[data-id="morning"]::before { background: linear-gradient(135deg, rgba(255, 154, 74, 0.20), transparent 60%); }
    .session-card[data-id="morning"] .session-numeral { color: var(--amber-bright); }
    .session-card[data-id="morning"] .session-voice { color: var(--amber-bright); }
    .session-card[data-id="morning"]::after { background: linear-gradient(90deg, transparent, var(--amber-bright), transparent); }

    /* AFTERNOON — sapphire teal */
    .session-card[data-id="afternoon"] { border-color: rgba(78, 184, 184, 0.32); }
    .session-card[data-id="afternoon"]:hover { border-color: var(--sapphire-bright); box-shadow: 0 24px 60px -20px var(--sapphire-glow), 0 0 30px var(--sapphire-glow); }
    .session-card[data-id="afternoon"]::before { background: linear-gradient(135deg, rgba(78, 184, 184, 0.20), transparent 60%); }
    .session-card[data-id="afternoon"] .session-numeral { color: var(--sapphire-bright); }
    .session-card[data-id="afternoon"] .session-voice { color: var(--sapphire-bright); }
    .session-card[data-id="afternoon"]::after { background: linear-gradient(90deg, transparent, var(--sapphire-bright), transparent); }

    /* EVENING — deep magenta */
    .session-card[data-id="evening"] { border-color: rgba(196, 75, 184, 0.32); }
    .session-card[data-id="evening"]:hover { border-color: var(--magenta-bright); box-shadow: 0 24px 60px -20px var(--magenta-glow), 0 0 30px var(--magenta-glow); }
    .session-card[data-id="evening"]::before { background: linear-gradient(135deg, rgba(196, 75, 184, 0.20), transparent 60%); }
    .session-card[data-id="evening"] .session-numeral { color: var(--magenta-bright); }
    .session-card[data-id="evening"] .session-voice { color: var(--magenta-bright); }
    .session-card[data-id="evening"]::after { background: linear-gradient(90deg, transparent, var(--magenta-bright), transparent); }

    /* BONUS — ruby coral */
    .session-card[data-id="bonus"] { border-color: rgba(232, 96, 127, 0.32); }
    .session-card[data-id="bonus"]:hover { border-color: var(--ruby-soft); box-shadow: 0 24px 60px -20px var(--ruby-glow), 0 0 30px var(--ruby-glow); }
    .session-card[data-id="bonus"]::before { background: linear-gradient(135deg, rgba(232, 96, 127, 0.20), transparent 60%); }
    .session-card[data-id="bonus"] .session-numeral { color: var(--ruby-soft); }
    .session-card[data-id="bonus"] .session-voice { color: var(--ruby-soft); }
    .session-card[data-id="bonus"]::after { background: linear-gradient(90deg, transparent, var(--ruby-soft), transparent); }

    /* SACRED — radiant gold */
    .session-card[data-id="sacred"] {
      background: linear-gradient(135deg, rgba(244, 197, 88, 0.14), rgba(212, 168, 60, 0.04));
      border-color: rgba(244, 197, 88, 0.42);
    }
    .session-card[data-id="sacred"]:hover { border-color: var(--gold-bright); box-shadow: 0 24px 60px -20px var(--gold-glow), 0 0 40px var(--gold-glow); }
    .session-card[data-id="sacred"]::before { background: linear-gradient(135deg, rgba(244, 197, 88, 0.22), transparent 60%); }
    .session-card[data-id="sacred"] .session-numeral { color: var(--gold-bright); }
    .session-card[data-id="sacred"] .session-voice { color: var(--gold-bright); }
    .session-card[data-id="sacred"]::after { background: linear-gradient(90deg, transparent, var(--gold-bright), transparent); }

    .session-card.custom { border-color: rgba(232, 96, 127, 0.32); }
    .session-card.custom:hover { border-color: var(--ruby-soft); box-shadow: 0 24px 60px -20px var(--ruby-glow); }
    .session-card.custom::before { background: linear-gradient(135deg, rgba(232, 96, 127, 0.18), transparent 60%); }
    .session-card.custom .session-numeral { color: var(--ruby-soft); }
    .session-card.custom .session-voice { color: var(--ruby-soft); }
    .session-card.custom::after { background: linear-gradient(90deg, transparent, var(--ruby-soft), transparent); }

    /* BIGGER session content */
    .session-numeral {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.625rem;
      font-style: italic;
      font-weight: 500;
      width: 3.25rem;
      flex-shrink: 0;
      transition: color 0.4s ease;
      position: relative;
      z-index: 1;
    }
    .session-content { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .session-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink-bright);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .session-tagline {
      font-size: 1.125rem;
      color: var(--ink-soft);
      font-weight: 500;
      line-height: 1.4;
    }
    .session-voice {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.75rem;
      display: block;
      transition: color 0.4s ease;
    }
    .session-arrow {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.125rem;
      color: var(--ink-mute);
      transition: all 0.4s ease;
      position: relative;
      z-index: 1;
    }
    .session-card:hover .session-arrow { color: var(--ink-bright); transform: translateX(6px); }

    .add-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.625rem;
      padding: 2rem;
      background: transparent;
      border: 1.5px dashed var(--line-strong);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-align: left;
    }
    .add-card:hover {
      border-color: var(--gold-bright);
      border-style: solid;
      background: rgba(244, 197, 88, 0.08);
      box-shadow: 0 0 30px var(--gold-glow);
    }
    .add-icon {
      font-family: 'Fraunces', serif;
      font-size: 2.875rem;
      color: var(--ink-mute);
      width: 3.25rem;
      text-align: center;
      flex-shrink: 0;
      font-weight: 500;
    }
    .add-card:hover .add-icon { color: var(--gold-bright); }
    .add-text {
      font-family: 'Fraunces', serif;
      font-size: 2.125rem;
      color: var(--ink-bright);
      font-style: italic;
      font-weight: 500;
    }
    .add-hint { font-size: 1.0625rem; color: var(--ink-mute); margin-top: 0.375rem; }

    /* PLAY SCREEN */
    .play-shell {
      min-height: 100vh;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom));
      animation: fadeIn 0.7s ease backwards;
    }

    .play-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }

    .icon-button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Fraunces', serif;
      font-size: 1.75rem;
      color: var(--ink-bright);
      transition: all 0.4s ease;
    }
    .icon-button:hover { border-color: var(--gold-bright); color: var(--gold-bright); background: rgba(244, 197, 88, 0.15); box-shadow: 0 0 20px var(--gold-glow); }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.625rem;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-bright);
    }

    .play-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 2.25rem; }

    /* === MULTI-RING BREATHING CIRCLE === */
    .breath-stage {
      position: relative;
      width: 360px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .breath-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      animation: breath-pulse 9s ease-in-out infinite;
    }
    .breath-ring-1 { width: 100%; height: 100%; }
    .breath-ring-2 { width: 88%; height: 88%; animation-delay: -1s; opacity: 0.8; }
    .breath-ring-3 { width: 76%; height: 76%; animation-delay: -2s; opacity: 0.6; border-style: dashed; }
    @keyframes breath-pulse {
      0%, 100% { transform: scale(0.92); opacity: 0.5; }
      50%      { transform: scale(1.08); opacity: 0.9; }
    }

    .breath-orb {
      width: 64%;
      height: 64%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.18), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(244, 197, 88, 0.12), rgba(196, 75, 184, 0.18) 60%, rgba(78, 184, 184, 0.10) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

function getTodaysWisdom() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return DAILY_WISDOM[dayOfYear % DAILY_WISDOM.length];
}

function romanize(num) {
  const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
  let result = '';
  for (const i in lookup) { while (num >= lookup[i]) { result += i; num -= lookup[i]; } }
  return result;
}

        <div class="audio-section fade-up stagger-5">
          <audio id="voiceAudio" controls preload="auto">
            <source src="${session.url}" type="audio/mpeg" />
          </audio>
          <p class="audio-help">${isSacred ? "— listen with reverence —" : "— flute layers in automatically —"}</p>
        </div>
        <div class="stream-footer fade-up stagger-6">
          <div class="status-dot"></div>
          Streaming from cloud
        </div>
      </div>
    </div>
  `;

  const voiceEl = document.getElementById("voiceAudio");
  if (fluteEl) fluteEl.volume = state.fluteVol / 100;

  // === WORKING AUDIO ARCHITECTURE — UNCHANGED ===
  voiceEl.addEventListener("play", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🪷 May this practice bring peace" : "Listen, breathe, receive";
    if (!isSacred && fluteEl) {
      fluteEl.currentTime = 0;
      fluteEl.play().catch(() => {});
    }
  });

  voiceEl.addEventListener("pause", () => {
    if (voiceEl.ended) return;
    document.getElementById("sessionStatus").textContent = "Paused";
    if (fluteEl) fluteEl.pause();
  });

  voiceEl.addEventListener("ended", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🙏 Namo Buddhaya" : "Complete ✦";
    if (fluteEl) {
      fluteEl.pause();
      fluteEl.currentTime = 0;
    }
  });

  if (!isSacred) {
    let breathing = "in";
    if (window.breathInterval) clearInterval(window.breathInterval);
    window.breathInterval = setInterval(() => {
      breathing = breathing === "in" ? "out" : "in";
      const el = document.getElementById("breathText");
      if (el) el.textContent = `breathe ${breathing}`;
    }, 4500);
  }
}

function refreshQuote() {
  let next = state.todaysQuote;
  while (next === state.todaysQuote && DAILY_WISDOM.length > 1) {
    next = DAILY_WISDOM[Math.floor(Math.random() * DAILY_WISDOM.length)];
  }
  state.todaysQuote = next;
  renderHome();
}

function addCustomSession() {
  const name = document.getElementById("newName").value.trim();
  const tagline = document.getElementById("newTagline").value.trim();
  const url = document.getElementById("newUrl").value.trim();
  if (!name || !url) { alert("Please enter at least a name and URL"); return; }
  state.customSessions.push({
    id: `custom-${Date.now()}`,
    name,
    tagline: tagline || "Custom affirmation",
    url,
    voiceLabel: "Custom",
  });
  saveCustom();
  state.showAdd = false;
  renderHome();
}

function removeCustom(id) {
  if (!confirm("Remove this affirmation?")) return;
  state.customSessions = state.customSessions.filter(s => s.id !== id);
  saveCustom();
  renderHome();
}

function enterSession(id) {
  state.activeSession = id;
  renderSession();
}

function exitSession() {
  state.activeSession = null;
  if (fluteEl) {
    fluteEl.pause();
    fluteEl.currentTime = 0;
  }
  if (window.breathInterval) clearInterval(window.breathInterval);
  renderHome();
}

renderHome();
</script>
</body>
</html>
