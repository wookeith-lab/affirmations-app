<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sanctuary" />
  <meta name="theme-color" content="#1e1338" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>Sanctuary — Daily Affirmations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);

      /* VIBRANT JEWEL TONE PALETTE */
      --bg-base: #1e1338;          /* Deep amethyst */
      --bg-elevated: #2a1d4a;      /* Slightly brighter purple */
      --bg-card: rgba(255, 255, 255, 0.06);
      --bg-card-hover: rgba(255, 255, 255, 0.10);

      --ink-bright: #ffffff;
      --ink-soft: #e8e0f5;         /* Soft lavender white */
      --ink-mute: #b5a8d4;         /* Muted purple */

      --gold: #ffc857;             /* Vibrant gold */
      --gold-glow: #ffdb8c;
      --coral: #ff6b6b;            /* Warm coral */
      --coral-soft: #ff9b9b;
      --teal: #4ecdc4;             /* Bright teal */
      --magenta: #c44bb8;          /* Magenta */
      --orange: #ff8c42;           /* Sunset orange */

      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.25);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg-base);
      color: var(--ink-bright);
      font-family: 'Inter Tight', -apple-system, sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
      font-size: 17px;
    }

    /* VIBRANT GRADIENT BACKGROUND - alive with color */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 0%, rgba(255, 107, 107, 0.25), transparent 50%),
        radial-gradient(ellipse at 85% 20%, rgba(196, 75, 184, 0.22), transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(78, 205, 196, 0.18), transparent 60%),
        radial-gradient(ellipse at 0% 70%, rgba(255, 200, 87, 0.12), transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%, 100% { transform: scale(0.92); } 50% { transform: scale(1.08); } }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
    .breath-circle { animation: breathe 9s ease-in-out infinite; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.15s; }
    .stagger-3 { animation-delay: 0.25s; }
    .stagger-4 { animation-delay: 0.35s; }
    .stagger-5 { animation-delay: 0.45s; }
    .stagger-6 { animation-delay: 0.55s; }
    .stagger-7 { animation-delay: 0.65s; }
    .stagger-8 { animation-delay: 0.75s; }

    .app-shell { position: relative; z-index: 2; max-width: 680px; margin: 0 auto; padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom)); }

    .eyebrow {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* SHIMMERING gold-to-coral display title */
    .display-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: clamp(4rem, 14vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--ink-bright);
    }
    .display-title em {
      font-style: italic;
      font-weight: 500;
      background: linear-gradient(90deg, var(--coral), var(--gold), var(--coral));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s ease-in-out infinite;
    }

    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }

    .pill-button {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.875rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink-bright);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
    }
    .pill-button:hover {
      border-color: var(--gold);
      background: rgba(255, 200, 87, 0.15);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 12px rgba(78, 205, 196, 0.8);
    }

    .ornament { display: flex; align-items: center; gap: 1rem; margin: 1.75rem auto; max-width: 18rem; }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .ornament-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255, 200, 87, 0.7);
    }

    .subtitle {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.375rem;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    /* WISDOM CARD - vibrant purple to coral gradient */
    .wisdom-card {
      background: linear-gradient(135deg, rgba(196, 75, 184, 0.2), rgba(255, 107, 107, 0.15));
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 200, 87, 0.3);
      border-radius: 12px;
      padding: 2.25rem;
      margin: 2rem 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 40px -12px rgba(196, 75, 184, 0.3);
    }
    .wisdom-card::before {
      content: '"';
      position: absolute;
      top: -3.5rem;
      left: 0.5rem;
      font-family: 'Fraunces', serif;
      font-size: 13rem;
      color: var(--gold);
      opacity: 0.18;
      line-height: 1;
      pointer-events: none;
    }
    .wisdom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .wisdom-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.75rem;
      font-style: italic;
      font-weight: 500;
      line-height: 1.4;
      color: var(--ink-bright);
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }
    .wisdom-source {
      text-align: right;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .icon-btn-small {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-soft);
      transition: all 0.3s ease;
      font-size: 1.25rem;
    }
    .icon-btn-small:hover { color: var(--gold); border-color: var(--gold); transform: rotate(180deg); background: rgba(255, 200, 87, 0.15); }

    .sessions-header { display: flex; justify-content: space-between; align-items: baseline; margin: 2rem 0 1.25rem; }

    /* SESSION CARDS - each one with its own VIBRANT theme */
    .session-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.75rem;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .session-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-3px);
      box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.4);
    }
    .session-card:active { transform: translateY(0); }
    .session-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }
    .session-card:hover::after { transform: scaleX(1); }

    /* MORNING - sunrise (coral + gold) */
    .session-card[data-id="morning"] { border-color: rgba(255, 140, 66, 0.3); }
    .session-card[data-id="morning"]:hover { border-color: var(--orange); background: linear-gradient(135deg, rgba(255, 140, 66, 0.18), rgba(255, 200, 87, 0.08)); }
    .session-card[data-id="morning"] .session-numeral { color: var(--orange); }
    .session-card[data-id="morning"] .session-voice { color: var(--orange); }
    .session-card[data-id="morning"]::after { background: linear-gradient(90deg, transparent, var(--orange), transparent); }

    /* AFTERNOON - bright teal */
    .session-card[data-id="afternoon"] { border-color: rgba(78, 205, 196, 0.3); }
    .session-card[data-id="afternoon"]:hover { border-color: var(--teal); background: linear-gradient(135deg, rgba(78, 205, 196, 0.18), rgba(78, 205, 196, 0.04)); }
    .session-card[data-id="afternoon"] .session-numeral { color: var(--teal); }
    .session-card[data-id="afternoon"] .session-voice { color: var(--teal); }
    .session-card[data-id="afternoon"]::after { background: linear-gradient(90deg, transparent, var(--teal), transparent); }

    /* EVENING - deep magenta */
    .session-card[data-id="evening"] { border-color: rgba(196, 75, 184, 0.3); }
    .session-card[data-id="evening"]:hover { border-color: var(--magenta); background: linear-gradient(135deg, rgba(196, 75, 184, 0.18), rgba(196, 75, 184, 0.04)); }
    .session-card[data-id="evening"] .session-numeral { color: var(--magenta); }
    .session-card[data-id="evening"] .session-voice { color: var(--magenta); }
    .session-card[data-id="evening"]::after { background: linear-gradient(90deg, transparent, var(--magenta), transparent); }

    /* BONUS - warm coral */
    .session-card[data-id="bonus"] { border-color: rgba(255, 107, 107, 0.3); }
    .session-card[data-id="bonus"]:hover { border-color: var(--coral); background: linear-gradient(135deg, rgba(255, 107, 107, 0.18), rgba(255, 107, 107, 0.04)); }
    .session-card[data-id="bonus"] .session-numeral { color: var(--coral); }
    .session-card[data-id="bonus"] .session-voice { color: var(--coral); }
    .session-card[data-id="bonus"]::after { background: linear-gradient(90deg, transparent, var(--coral), transparent); }

    /* SACRED - radiant gold */
    .session-card[data-id="sacred"] {
      background: linear-gradient(135deg, rgba(255, 200, 87, 0.15), rgba(255, 200, 87, 0.04));
      border-color: rgba(255, 200, 87, 0.4);
    }
    .session-card[data-id="sacred"]:hover { border-color: var(--gold); background: linear-gradient(135deg, rgba(255, 200, 87, 0.25), rgba(255, 200, 87, 0.08)); }
    .session-card[data-id="sacred"] .session-numeral { color: var(--gold); }
    .session-card[data-id="sacred"] .session-voice { color: var(--gold); }
    .session-card[data-id="sacred"]::after { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

    /* CUSTOM cards */
    .session-card.custom { border-color: rgba(255, 155, 155, 0.3); }
    .session-card.custom:hover { border-color: var(--coral-soft); background: linear-gradient(135deg, rgba(255, 155, 155, 0.15), rgba(255, 155, 155, 0.04)); }
    .session-card.custom .session-numeral { color: var(--coral-soft); }
    .session-card.custom .session-voice { color: var(--coral-soft); }
    .session-card.custom::after { background: linear-gradient(90deg, transparent, var(--coral-soft), transparent); }

    .session-numeral {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.25rem;
      font-style: italic;
      font-weight: 500;
      width: 2.75rem;
      flex-shrink: 0;
      transition: color 0.3s ease;
    }
    .session-content { flex: 1; min-width: 0; }
    .session-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink-bright);
      line-height: 1.15;
      margin-bottom: 0.375rem;
    }
    .session-tagline {
      font-size: 1.0625rem;
      color: var(--ink-soft);
      font-weight: 500;
      line-height: 1.4;
    }
    .session-voice {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.625rem;
      display: block;
      transition: color 0.3s ease;
    }
    .session-arrow {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      color: var(--ink-mute);
      transition: all 0.3s ease;
    }
    .session-card:hover .session-arrow { color: var(--ink-bright); transform: translateX(4px); }

    .add-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.75rem;
      background: transparent;
      border: 1.5px dashed var(--line-strong);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }
    .add-card:hover {
      border-color: var(--gold);
      border-style: solid;
      background: rgba(255, 200, 87, 0.08);
    }
    .add-icon {
      font-family: 'Fraunces', serif;
      font-size: 2.5rem;
      color: var(--ink-mute);
      width: 2.75rem;
      text-align: center;
      flex-shrink: 0;
      font-weight: 500;
    }
    .add-card:hover .add-icon { color: var(--gold); }
    .add-text {
      font-family: 'Fraunces', serif;
      font-size: 1.875rem;
      color: var(--ink-bright);
      font-style: italic;
      font-weight: 500;
    }
    .add-hint { font-size: 1rem; color: var(--ink-mute); margin-top: 0.25rem; }

    /* PLAY SCREEN with session-specific gradient backgrounds */
    .play-shell {
      min-height: 100vh;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: max(2rem, var(--safe-top)) 1.5rem max(2rem, var(--safe-bottom));
    }

    .play-shell.morning::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 140, 66, 0.4), transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(255, 200, 87, 0.2), transparent 60%);
      pointer-events: none; z-index: -1;
    }
    .play-shell.afternoon::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(78, 205, 196, 0.4), transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(78, 205, 196, 0.15), transparent 60%);
      pointer-events: none; z-index: -1;
    }
    .play-shell.evening::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(196, 75, 184, 0.4), transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(78, 70, 180, 0.2), transparent 60%);
      pointer-events: none; z-index: -1;
    }
    .play-shell.bonus::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 107, 107, 0.4), transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(255, 155, 155, 0.2), transparent 60%);
      pointer-events: none; z-index: -1;
    }
    .play-shell.sacred::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 200, 87, 0.4), transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(255, 140, 66, 0.2), transparent 60%);
      pointer-events: none; z-index: -1;
    }

    .play-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }

    .icon-button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Fraunces', serif;
      font-size: 1.625rem;
      color: var(--ink-bright);
      transition: all 0.3s ease;
    }
    .icon-button:hover { border-color: var(--gold); color: var(--gold); background: rgba(255, 200, 87, 0.15); }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 1.375rem;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-bright);
    }

    .play-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 2rem; }

    .breath-outer {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.6), inset 0 2px 8px rgba(255, 255, 255, 0.12);
      position: relative;
    }
    .breath-outer::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed var(--line-strong);
      opacity: 0.5;
    }

    .breath-inner-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.875rem;
      font-style: italic;
      font-weight: 500;
      color: var(--ink-bright);
      letter-spacing: 0.02em;
    }

    .session-status {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.875rem, 5vw, 2.5rem);
      font-style: italic;
      font-weight: 500;
      color: var(--ink-bright);
      line-height: 1.3;
      max-width: 32rem;
      min-height: 3rem;
    }

    .voice-label {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.875rem 1.5rem;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-bright);
    }

    .audio-section { width: 100%; max-width: 32rem; padding: 0 1rem; }
    audio {
      width: 100%;
      height: 64px;
      border-radius: 100px;
      filter: invert(1) hue-rotate(180deg);
    }
    .audio-help {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .stream-footer {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
    }

    .home-footer {
      text-align: center;
      margin-top: 4rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20, 10, 35, 0.8);
      backdrop-filter: blur(12px);
      z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 1rem;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; } }
    .modal {
      width: 100%;
      max-width: 30rem;
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-base));
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      padding: 2.25rem;
      max-height: 90vh;
      overflow-y: auto;
      color: var(--ink-bright);
      box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.6);
    }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .modal-close {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--ink-bright);
    }
    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.625rem;
    }
    .form-input {
      width: 100%;
      padding: 1.125rem 1.25rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 1.0625rem;
      font-weight: 500;
      color: var(--ink-bright);
      transition: border-color 0.2s ease;
    }
    .form-input::placeholder { color: var(--ink-mute); }
    .form-input:focus { outline: none; border-color: var(--gold); }
    .form-hint { font-size: 0.875rem; color: var(--ink-mute); margin-top: 0.625rem; font-style: italic; }
    .primary-btn {
      width: 100%;
      padding: 1.25rem;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      color: var(--bg-base);
      border: none;
      border-radius: 8px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(255, 200, 87, 0.4);
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 200, 87, 0.5); }

    .custom-list { display: flex; flex-direction: column; gap: 0.625rem; }
    .custom-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.125rem 1.25rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .custom-item .name { font-size: 1.0625rem; font-weight: 600; }
    .delete-btn {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .delete-btn:hover { background: rgba(255, 107, 107, 0.2); color: var(--coral); border-color: var(--coral); }

    .volume-row { display: flex; flex-direction: column; gap: 0.75rem; }
    .volume-header { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; color: var(--ink-bright); }

    input[type="range"] {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 3px solid var(--bg-base);
      box-shadow: 0 2px 8px rgba(255, 200, 87, 0.6);
      appearance: none;
      -webkit-appearance: none;
    }
  </style>
</head>
<body>

<audio id="fluteBackground" loop preload="auto" style="display:none">
  <source src="https://res.cloudinary.com/dgvrjgorn/video/upload/v1777437029/danamusic-relaxing-flute-meditation-416756_eri5yl.mp3" type="audio/mpeg" />
</audio>

<div id="app"></div>

<script>
const SESSIONS = [
  { id: "morning", numeral: "I", name: "Morning", tagline: "To activate wealth & vitality", url: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_41_47_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_tljw3f.mp3", voiceLabel: "Victoria", type: "affirmation" },
  { id: "afternoon", numeral: "II", name: "Afternoon", tagline: "A pause for power & focus", url: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436656/ElevenLabs_2026-04-29T03_42_51_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_wvo0mh.mp3", voiceLabel: "Victoria", type: "affirmation" },
  { id: "evening", numeral: "III", name: "Evening", tagline: "Rest, heal & multiply", url: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436654/ElevenLabs_2026-04-29T03_43_31_Victoria_-_Warm_Trustworthy_and_Relatable_pvc_sp108_s100_sb100_se100_b_m2_yjm6ys.mp3", voiceLabel: "Victoria", type: "affirmation" },
  { id: "bonus", numeral: "IV", name: "Grounding", tagline: "Deep grounding & inner power", url: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777436641/ElevenLabs_2026-04-29T03_19_28_Roger_-_Laid-Back_Casual_Resonant_pre_sp100_s50_sb75_se0_b_m2_tjzmxa.mp3", voiceLabel: "Roger", type: "affirmation" },
  { id: "sacred", numeral: "V", name: "Sacred", tagline: "南无本师释迦牟尼佛 · Devotional chant", url: "https://res.cloudinary.com/dgvrjgorn/video/upload/v1777519525/%E5%8D%97%E6%97%A0%E6%9C%AC%E5%B8%88%E9%87%8A%E8%BF%A6%E7%89%9F%E5%B0%BC%E4%BD%9B_%E4%BD%9B%E5%8F%B7_Group_Performance_Version_%E8%A1%A8%E6%BC%94%E7%89%88_xfaryg.mp3", voiceLabel: "Buddhist Chant", type: "devotional" },
];

const DAILY_WISDOM = [
  { text: "I am safe. All is well in my world.", source: "Affirmation" },
  { text: "Money flows to me freely and abundantly.", source: "Affirmation" },
  { text: "Every cell in my body radiates with health.", source: "Affirmation" },
  { text: "I am worthy of all the good coming to me today.", source: "Affirmation" },
  { text: "I trust the journey, even when I cannot see the path.", source: "Affirmation" },
  { text: "What we are aiming for is not to avoid life's storms, but to find the middle path.", source: "Wisdom" },
  { text: "The wound is the place where the Light enters you.", source: "Rumi" },
  { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", source: "Rumi" },
  { text: "Out beyond ideas of right and wrong, there is a field. I'll meet you there.", source: "Rumi" },
  { text: "What you seek is seeking you.", source: "Rumi" },
  { text: "The quieter you become, the more you can hear.", source: "Ram Dass" },
  { text: "We are all just walking each other home.", source: "Ram Dass" },
  { text: "Be here now.", source: "Ram Dass" },
  { text: "The journey of a thousand miles begins with a single step.", source: "Lao Tzu" },
  { text: "When I let go of what I am, I become what I might be.", source: "Lao Tzu" },
  { text: "Nature does not hurry, yet everything is accomplished.", source: "Lao Tzu" },
  { text: "Health is the greatest wealth.", source: "Wisdom" },
  { text: "I am exactly where I need to be, doing exactly what I need to do.", source: "Affirmation" },
  { text: "My income increases constantly.", source: "Affirmation" },
  { text: "I forgive myself for not knowing what I didn't know before I learned it.", source: "Affirmation" },
  { text: "The present moment is the only moment available to us.", source: "Thich Nhat Hanh" },
  { text: "Smile, breathe, and go slowly.", source: "Thich Nhat Hanh" },
  { text: "Walk as if you are kissing the Earth with your feet.", source: "Thich Nhat Hanh" },
  { text: "I am healing. I am whole. I am home.", source: "Affirmation" },
  { text: "I am a magnet for prosperity.", source: "Affirmation" },
  { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", source: "Emerson" },
  { text: "The only journey is the one within.", source: "Rilke" },
  { text: "Let yourself be silently drawn by the strange pull of what you really love.", source: "Rumi" },
  { text: "I release everything I no longer need.", source: "Affirmation" },
  { text: "Today I move with confidence. Today I am unstoppable.", source: "Affirmation" },
  { text: "Be soft. Do not let the world make you hard.", source: "Wisdom" },
  { text: "This too shall pass.", source: "Wisdom" },
  { text: "I am loved beyond measure. I am loved without condition.", source: "Affirmation" },
  { text: "All conditioned things are impermanent. Work out your salvation with diligence.", source: "Buddha" },
  { text: "Peace comes from within. Do not seek it without.", source: "Buddha" },
  { text: "Three things cannot be long hidden: the sun, the moon, and the truth.", source: "Buddha" },
];

function getTodaysWisdom() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return DAILY_WISDOM[dayOfYear % DAILY_WISDOM.length];
}

function romanize(num) {
  const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
  let result = '';
  for (const i in lookup) { while (num >= lookup[i]) { result += i; num -= lookup[i]; } }
  return result;
}

const state = {
  activeSession: null,
  customSessions: JSON.parse(localStorage.getItem("affirmation-custom") || "[]"),
  fluteVol: parseInt(localStorage.getItem("flute-vol") || "40"),
  todaysQuote: getTodaysWisdom(),
  showSetup: false,
  showAdd: false,
};

function saveCustom() { localStorage.setItem("affirmation-custom", JSON.stringify(state.customSessions)); }
function saveVolumes() { localStorage.setItem("flute-vol", state.fluteVol); }

function getAllSessions() {
  let custom = state.customSessions.map((s, i) => ({
    ...s,
    numeral: romanize(SESSIONS.length + i + 1),
    type: "affirmation",
    isCustom: true,
  }));
  return [...SESSIONS, ...custom];
}

const fluteEl = document.getElementById("fluteBackground");
const app = document.getElementById("app");

function renderHome() {
  const sessions = getAllSessions();
  app.innerHTML = `
    <div class="app-shell">
      <div class="top-bar fade-up stagger-1">
        <button onclick="state.showSetup = true; renderHome();" class="pill-button">
          ⚙ Settings <span class="status-dot"></span>
        </button>
      </div>
      <div class="fade-up stagger-2" style="text-align: center; margin-bottom: 1rem;">
        <div class="eyebrow" style="margin-bottom: 1.5rem;">— Daily Practice —</div>
        <h1 class="display-title">I am rich.<br/><em>I am healthy.</em></h1>
        <div class="ornament">
          <div class="ornament-line"></div>
          <div class="ornament-dot"></div>
          <div class="ornament-line"></div>
        </div>
        <p class="subtitle">Your sanctuary for affirmations</p>
      </div>
      <div class="wisdom-card fade-up stagger-3">
        <div class="wisdom-header">
          <div class="eyebrow">Today's Wisdom</div>
          <button onclick="refreshQuote()" class="icon-btn-small" title="New wisdom">↻</button>
        </div>
        <p class="wisdom-text">${state.todaysQuote.text}</p>
        <p class="wisdom-source">— ${state.todaysQuote.source}</p>
      </div>
      <div class="sessions-header fade-up stagger-4">
        <div class="eyebrow">Sessions</div>
        <div class="eyebrow" style="color: var(--ink-mute);">${sessions.length} total</div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 0.875rem;">
        ${sessions.map((s, i) => `
          <button onclick="enterSession('${s.id}')" data-id="${s.id}" class="session-card fade-up stagger-${Math.min(i + 5, 8)} ${s.isCustom ? 'custom' : ''}">
            <div class="session-numeral">${s.numeral}</div>
            <div class="session-content">
              <div class="session-name">${s.name}</div>
              <div class="session-tagline">${s.tagline}</div>
              <span class="session-voice">${s.voiceLabel}</span>
            </div>
            <span class="session-arrow">→</span>
          </button>
        `).join("")}
        <button onclick="state.showAdd = true; renderHome();" class="add-card fade-up stagger-8">
          <div class="add-icon">+</div>
          <div class="session-content">
            <div class="add-text">Add Affirmation</div>
            <div class="add-hint">Paste any audio URL</div>
          </div>
        </button>
      </div>
      <p class="home-footer fade-up stagger-8">— and so it is —</p>
    </div>
    ${state.showSetup ? renderSetupModal() : ""}
    ${state.showAdd ? renderAddModal() : ""}
  `;
}

function renderSetupModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target === this) { state.showSetup = false; renderHome(); }">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem;">
          <h2 class="modal-title">Settings</h2>
          <button onclick="state.showSetup = false; renderHome();" class="modal-close">✕</button>
        </div>
        <div style="margin-bottom: 1.75rem; padding: 1.25rem 1.5rem; background: rgba(0, 0, 0, 0.25); border: 1px solid var(--line); border-radius: 8px;">
          <div style="display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.625rem;">
            <span class="status-dot"></span>
            <span style="font-size: 1.0625rem; font-weight: 700;">Cloud Audio Connected</span>
          </div>
          <p style="font-size: 0.9375rem; color: var(--ink-soft); line-height: 1.5;">All voices and flute load from your Cloudinary cloud.</p>
        </div>
        ${state.customSessions.length > 0 ? `
          <div style="margin-bottom: 1.75rem;">
            <div class="form-label">Your Custom Affirmations</div>
            <div class="custom-list">
              ${state.customSessions.map(s => `
                <div class="custom-item">
                  <span style="color: var(--coral); font-size: 1.5rem; font-family: 'Fraunces', serif; font-style: italic;">${s.name.charAt(0)}</span>
                  <span class="name" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${s.name}</span>
                  <button onclick="removeCustom('${s.id}')" class="delete-btn">remove</button>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}
        <div style="margin-bottom: 1.75rem;">
          <div class="form-label" style="margin-bottom: 1.25rem;">Background Flute Volume</div>
          <div class="volume-row">
            <div class="volume-header">
              <span>Flute</span><span id="fluteVolDisplay">${state.fluteVol}%</span>
            </div>
            <input type="range" min="0" max="100" value="${state.fluteVol}" oninput="state.fluteVol = +this.value; saveVolumes(); fluteEl.volume = this.value/100; document.getElementById('fluteVolDisplay').textContent = this.value + '%';" />
          </div>
        </div>
        <button onclick="state.showSetup = false; renderHome();" class="primary-btn">Done</button>
      </div>
    </div>
  `;
}

function renderAddModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target === this) { state.showAdd = false; renderHome(); }">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem;">
          <h2 class="modal-title">Add Affirmation</h2>
          <button onclick="state.showAdd = false; renderHome();" class="modal-close">✕</button>
        </div>
        <p style="font-size: 1.0625rem; color: var(--ink-soft); line-height: 1.5; margin-bottom: 1.75rem;">
          Paste a Cloudinary URL or any public audio link.
        </p>
        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
          <div>
            <label class="form-label">Name</label>
            <input id="newName" type="text" class="form-input" placeholder="e.g. Healing, Sleep" />
          </div>
          <div>
            <label class="form-label">Tagline</label>
            <input id="newTagline" type="text" class="form-input" placeholder="A short description" />
          </div>
          <div>
            <label class="form-label">Audio URL</label>
            <input id="newUrl" type="url" class="form-input" placeholder="https://res.cloudinary.com/..." />
            <p class="form-hint">Upload to your Cloudinary, copy the URL, paste here.</p>
          </div>
        </div>
        <button onclick="addCustomSession()" class="primary-btn" style="margin-top: 1.75rem;">Add to Sanctuary</button>
      </div>
    </div>
  `;
}

function renderSession() {
  const session = getAllSessions().find(s => s.id === state.activeSession);
  if (!session) return renderHome();
  const isSacred = session.type === "devotional";
  const themeClass = ["morning", "afternoon", "evening", "bonus", "sacred"].includes(session.id) ? session.id : "evening";

  app.innerHTML = `
    <div class="play-shell ${themeClass}">
      <div class="play-header fade-up stagger-1">
        <button onclick="exitSession()" class="icon-button">‹</button>
        <div class="session-badge">${session.numeral} · ${session.name}</div>
        <div style="width: 52px;"></div>
      </div>
      <div class="play-content">
        <div class="fade-up stagger-2">
          <div class="breath-outer breath-circle">
            ${isSacred ? `<div style="font-size: 6rem; color: var(--gold); text-shadow: 0 0 20px rgba(255, 200, 87, 0.6);">✦</div>` : `<span id="breathText" class="breath-inner-text">breathe in</span>`}
          </div>
        </div>
        <div class="fade-up stagger-3">
          <p id="sessionStatus" class="session-status">${isSacred ? "May all beings be at peace" : "Press play to begin"}</p>
        </div>
        <div class="fade-up stagger-4">
          <div class="voice-label">
            <span style="color: var(--gold);">●</span>
            ${session.voiceLabel}
          </div>
        </div>
        <div class="audio-section fade-up stagger-5">
          <audio id="voiceAudio" controls preload="auto">
            <source src="${session.url}" type="audio/mpeg" />
          </audio>
          <p class="audio-help">${isSacred ? "— listen with reverence —" : "— flute layers in automatically —"}</p>
        </div>
        <div class="stream-footer fade-up stagger-6">
          <div class="status-dot"></div>
          Streaming from cloud
        </div>
      </div>
    </div>
  `;

  const voiceEl = document.getElementById("voiceAudio");
  if (fluteEl) fluteEl.volume = state.fluteVol / 100;

  voiceEl.addEventListener("play", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🪷 May this practice bring peace" : "Listen, breathe, receive";
    if (!isSacred && fluteEl) {
      fluteEl.currentTime = 0;
      fluteEl.play().catch(() => {});
    }
  });

  voiceEl.addEventListener("pause", () => {
    if (voiceEl.ended) return;
    document.getElementById("sessionStatus").textContent = "Paused";
    if (fluteEl) fluteEl.pause();
  });

  voiceEl.addEventListener("ended", () => {
    document.getElementById("sessionStatus").textContent = isSacred ? "🙏 Namo Buddhaya" : "Complete ✦";
    if (fluteEl) {
      fluteEl.pause();
      fluteEl.currentTime = 0;
    }
  });

  if (!isSacred) {
    let breathing = "in";
    if (window.breathInterval) clearInterval(window.breathInterval);
    window.breathInterval = setInterval(() => {
      breathing = breathing === "in" ? "out" : "in";
      const el = document.getElementById("breathText");
      if (el) el.textContent = `breathe ${breathing}`;
    }, 4500);
  }
}

function refreshQuote() {
  let next = state.todaysQuote;
  while (next === state.todaysQuote && DAILY_WISDOM.length > 1) {
    next = DAILY_WISDOM[Math.floor(Math.random() * DAILY_WISDOM.length)];
  }
  state.todaysQuote = next;
  renderHome();
}

function addCustomSession() {
  const name = document.getElementById("newName").value.trim();
  const tagline = document.getElementById("newTagline").value.trim();
  const url = document.getElementById("newUrl").value.trim();
  if (!name || !url) { alert("Please enter at least a name and URL"); return; }
  state.customSessions.push({
    id: `custom-${Date.now()}`,
    name,
    tagline: tagline || "Custom affirmation",
    url,
    voiceLabel: "Custom",
  });
  saveCustom();
  state.showAdd = false;
  renderHome();
}

function removeCustom(id) {
  if (!confirm("Remove this affirmation?")) return;
  state.customSessions = state.customSessions.filter(s => s.id !== id);
  saveCustom();
  renderHome();
}

function enterSession(id) {
  state.activeSession = id;
  renderSession();
}

function exitSession() {
  state.activeSession = null;
  if (fluteEl) {
    fluteEl.pause();
    fluteEl.currentTime = 0;
  }
  if (window.breathInterval) clearInterval(window.breathInterval);
  renderHome();
}

renderHome();
</script>
</body>
</html>
